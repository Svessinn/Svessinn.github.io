      <div class="nav-row mode-section quest-links">

      <div class="nav-row mode-section trace-links">

        <a href="../Trace/solver.html" class="nav-btn current-page">SOLVER</a>

    <div class="stats">
      <div id="status-container" style="position: relative">
        <button
          id="settings-btn"
          onclick="toggleSettings(true)"
          style="position: absolute; top: 10px; right: 10px; cursor: pointer"
        >
          ⚙️
        </button>
      </div>
      <h1>Trace Solver</h1>
      <div style="margin-bottom: 15px">
        <div style="font-size: 11px; color: #888; margin-bottom: 8px">TOTAL COLORS (INCLUDING BLUE)</div>
        <div class="nav-row" style="justify-content: center; background: transparent; border: none; padding: 0">
          <button class="nav-btn color-toggle" onclick="updateColorCount(6, this)">6</button>
          <button class="nav-btn color-toggle" onclick="updateColorCount(7, this)">7</button>
          <button class="nav-btn color-toggle" onclick="updateColorCount(8, this)">8</button>
          <button class="nav-btn color-toggle" onclick="updateColorCount(9, this)">9</button>
        </div>
      </div>
      <div id="status" style="font-size: 11px; color: #aaa">PHASE: Hunting Blues</div>
      <div class="stat-row">
        <div class="stat-item">
          <span class="stat-val" id="found-count">0/--</span>
          <span class="stat-lbl">SHIP SEGMENTS</span>
        </div>
      </div>
    </div>

    <div class="game-container">
      <div class="grid" id="grid"></div>

      <div id="picker-area" class="picker-container">
        <div
          id="selection-info"
          style="font-size: 10px; color: #888; margin-bottom: 10px; text-align: center; text-transform: uppercase"
        >
          Select a cell on the grid
        </div>
        <div class="picker" id="dynamic-picker"></div>
      </div>
    </div>

    <div class="controls" style="display: flex; gap: 10px; justify-content: center">
      <button onclick="undoMove()" class="reset-button" id="undo-btn" style="background: #444; border-color: #666" disabled>
        UNDO LAST MOVE
      </button>
      <button onclick="reset()" class="reset-button">RESET SOLVER</button>
    </div>

    <div id="settings-overlay" class="hidden">
      <div class="settings-content">
        <button class="close-btn" onclick="toggleSettings(false)">×</button>
        <h2>Settings</h2>
        <hr />

        <div class="setting-item">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px">
            <label>Grid Opacity</label>
            <span id="opacity-val" style="font-weight: bold; color: #2ecc71">100%</span>
          </div>
          <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px">
            <button onclick="adjustOpacity(-1)" class="fine-tune-btn">−</button>
            <input
              type="range"
              id="opacity-slider"
              min="10"
              max="100"
              value="100"
              oninput="updateOpacity(this.value)"
              style="flex: 1"
            />
            <button onclick="adjustOpacity(1)" class="fine-tune-btn">+</button>
          </div>
        </div>

        <div class="setting-item">
          <label style="display: block; margin-bottom: 10px">Solving Strategy</label>
          <select
            id="strategy-select"
            onchange="updateStrategy(this.value)"
            style="
              width: 100%;
              padding: 8px;
              background: #2ecc71;
              font-weight: bold;
              color: black;
              border: 1px solid #30bb6a;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            <option value="standard">Standard (Blue Focus)</option>
            <option value="anti-teal">Anti-Teal (Avoid Teal)</option>
            <option value="ship-hunter">Aggressive (Ship Hunter)</option>
          </select>
        </div>

        <div class="setting-item">
          <button class="reset-btn" onclick="settingsReset()">Hard Reset Game</button>
        </div>
      </div>
    </div>

    <script>
      const MODES = {
        STANDARD: "standard", // Current logic: Blues first, then Ships
        ANTI_TEAL: "anti-teal", // Avoids the Teal ship specifically
        SHIP_HUNTER: "ship-hunter", // Ignores safety, targets any ship density
      };

      let currentMode = MODES.STANDARD;

      let revealed = {};
      let history = [];
      let selectedIdx = null;
      let currentColorCount = 6;
      let cachedCertain = {};
      let lastMoveWasBadBlue = false; // New state variable
      const ALL_COLORS = {
        "B": { class: "blue", name: "BLUE", len: 0, always: true },
        "T": { class: "teal", name: "TEAL", len: 4, always: true },
        "G": { class: "green", name: "GREEN", len: 3, always: true },
        "Y": { class: "yellow", name: "YELLOW", len: 3, always: true },
        "O": { class: "orange", name: "ORANGE", len: 2, always: true },
        "R": { class: "red", name: "RED", len: 2, always: false },
        "W": { class: "rainbow", name: "RAINBOW", len: 2, always: false },
        "L": { class: "light", name: "LIGHT", len: 2, always: false },
        "D": { class: "dark", name: "DARK", len: 2, always: false },
      };

      // --- CORE UTILITIES ---

      function isGameOver() {
        return lastMoveWasBadBlue;
      }

      function isVictory() {
        return Object.keys(revealed).length === 25;
      }

      function updateColorCount(count, btn) {
        document.querySelectorAll(".color-toggle").forEach((b) => b.classList.remove("current-page"));
        btn.classList.add("current-page");
        currentColorCount = parseInt(count);
        reset();
      }

      function reset() {
        revealed = {};
        history = [];
        selectedIdx = null;
        lastMoveWasBadBlue = false; // Reset the death state
        render();
      }

      function saveHistory() {
        history.push(JSON.stringify(revealed));
        document.getElementById("undo-btn").disabled = false;
      }

      function undoMove() {
        if (history.length === 0) return;
        revealed = JSON.parse(history.pop());
        selectedIdx = null;

        // Re-check if the previous state was a game over state
        // (Or simply reset it since the user is stepping back from the death move)
        lastMoveWasBadBlue = false;

        if (history.length === 0) document.getElementById("undo-btn").disabled = true;
        render();
      }

      function getActiveShips() {
        const common = Object.keys(ALL_COLORS).filter((k) => ALL_COLORS[k].always);
        const userPlacedRares = [...new Set(Object.values(revealed))].filter((k) => ALL_COLORS[k] && !ALL_COLORS[k].always); // Safe lookup

        const totalRaresAllowed = Math.max(0, currentColorCount - 5);

        if (userPlacedRares.length < totalRaresAllowed) {
          const allRares = Object.keys(ALL_COLORS).filter((k) => !ALL_COLORS[k].always);
          return [...common, ...allRares];
        }
        return [...common, ...userPlacedRares];
      }

      function getPossiblePlacements(len) {
        let placements = [];
        for (let r = 0; r < 5; r++) {
          for (let c = 0; c <= 5 - len; c++) {
            let ship = [];
            for (let i = 0; i < len; i++) ship.push(r * 5 + (c + i));
            placements.push(ship);
          }
        }
        for (let c = 0; c < 5; c++) {
          for (let r = 0; r <= 5 - len; r++) {
            let ship = [];
            for (let i = 0; i < len; i++) ship.push((r + i) * 5 + c);
            placements.push(ship);
          }
        }
        return placements;
      }

      // --- DEDUCTION ENGINE ---

      function getDeductions() {
        // 1. INITIALIZATION
        // We create a virtual board to simulate placements and a heatmap for probabilities
        let virtualRevealed = { ...revealed };
        let heatmap = Array(25)
          .fill(null)
          .map(() => ({}));
        let certain = {};
        let foundNewCertainty = true;
        let canContainShip = Array(25).fill(false);

        // Identify which rares we actually know the names of
        const active = getActiveShips();
        const identifiedRares = [...new Set(Object.values(revealed))].filter((k) => ALL_COLORS[k] && !ALL_COLORS[k].always);

        // Calculate how many rare ships are expected based on the color count
        const totalRaresExpected = Math.max(0, currentColorCount - 5);
        const missingRaresCount = Math.max(0, totalRaresExpected - identifiedRares.length);

        // 2. PASS 1: GEOMETRIC CERTAINTY (Finding guaranteed segments)
        while (foundNewCertainty) {
          foundNewCertainty = false;
          const currentCounts = {};
          Object.values(virtualRevealed).forEach((v) => (currentCounts[v] = (currentCounts[v] || 0) + 1));

          active.forEach((color) => {
            const ship = ALL_COLORS[color];
            const foundIdx = Object.keys(virtualRevealed)
              .filter((k) => virtualRevealed[k] === color)
              .map(Number);

            // If this ship is already fully placed, skip it
            if (currentCounts[color] >= ship.len) return;

            // Find all valid horizontal/vertical spots for this ship
            let validPos = getPossiblePlacements(ship.len).filter((pos) => {
              if (!foundIdx.every((i) => pos.includes(i))) return false;
              if (pos.some((i) => virtualRevealed[i] && virtualRevealed[i] !== color)) return false;
              return true;
            });

            if (validPos.length === 0) return;

            // If all valid positions share a specific cell, that cell MUST be this ship
            let intersection = validPos[0].filter((idx) => validPos.every((p) => p.includes(idx)));
            intersection.forEach((idx) => {
              if (!virtualRevealed[idx]) {
                // If it's a common ship or a named rare, we know the exact color
                if (ship.always || identifiedRares.includes(color)) {
                  virtualRevealed[idx] = color;
                  certain[idx] = color;
                  heatmap[idx] = { [color]: 1 };
                  foundNewCertainty = true;
                }
                // If it's a rare we haven't named yet, mark as "Mystery Rare" (?)
                else if (!certain[idx]) {
                  certain[idx] = "?";
                  heatmap[idx] = { "?": 1 };
                }
              }
            });
          });
        }

        // 3. PASS 2: SHIP PROBABILITIES
        // For every ship that isn't finished, calculate how likely it is to be in each cell
        active.forEach((color) => {
          const ship = ALL_COLORS[color];
          const foundIdx = Object.keys(virtualRevealed)
            .filter((v) => virtualRevealed[v] === color)
            .map(Number);
          if (foundIdx.length >= ship.len) return;

          let validPos = getPossiblePlacements(ship.len).filter((pos) => {
            if (!foundIdx.every((i) => pos.includes(i))) return false;
            if (pos.some((i) => virtualRevealed[i] && virtualRevealed[i] !== color)) return false;
            return true;
          });

          validPos.forEach((pos) => {
            pos.forEach((idx) => {
              canContainShip[idx] = true;
              if (!revealed[idx] && !certain[idx]) {
                heatmap[idx][color] = (heatmap[idx][color] || 0) + 1 / validPos.length;
              }
            });
          });
        });

        // 4. PASS 3: MYSTERY RARE PROBABILITIES
        // If we expect rares that haven't been found, distribute that weight across valid rare spots
        if (missingRaresCount > 0) {
          let allValidRarePositions = getPossiblePlacements(2).filter((pos) =>
            pos.every((idx) => !virtualRevealed[idx] || identifiedRares.includes(virtualRevealed[idx])),
          );
          allValidRarePositions.forEach((pos) => {
            pos.forEach((idx) => {
              canContainShip[idx] = true;
              if (!revealed[idx] && !certain[idx]) {
                heatmap[idx]["?"] = (heatmap[idx]["?"] || 0) + missingRaresCount / allValidRarePositions.length;
              }
            });
          });
        }

        // 5. PASS 4: BLUE (EMPTY) PROBABILITIES
        // Calculate how many Blue cells are left and distribute them among non-certain cells
        const totalShipSegments = 12 + totalRaresExpected * 2;
        const totalBluesExpected = 25 - totalShipSegments;
        const bluesRevealed = Object.values(revealed).filter((v) => v === "B").length;
        const bluesCertainCount = Object.values(certain).filter((v) => v === "B").length;

        // Cells that aren't revealed or strictly proven to be a ship
        const mysteryCells = Array.from({ length: 25 }, (_, i) => i).filter((i) => !revealed[i] && !certain[i]);
        const bluesToDistribute = Math.max(0, totalBluesExpected - (bluesRevealed + bluesCertainCount));
        const mysteryBlueProb = mysteryCells.length > 0 ? bluesToDistribute / mysteryCells.length : 0;

        // If a cell physically CANNOT contain any ship, it is 100% Blue
        for (let i = 0; i < 25; i++) {
          if (!revealed[i] && !certain[i] && !canContainShip[i]) {
            certain[i] = "B";
            heatmap[i] = { "B": 1 };
          }
        }

        // Assign the calculated Blue probability to all possible mystery cells
        mysteryCells.forEach((idx) => {
          heatmap[idx]["B"] = (heatmap[idx]["B"] || 0) + mysteryBlueProb;
        });

        // 6. FINAL PASS: DYNAMIC NORMALIZATION
        // This cleans up the data so percentages add up to 100% and hidden rares don't clutter the UI
        const revealedColors = Object.values(revealed);
        const rareKeys = ["R", "L", "D", "W"];

        for (let i = 0; i < 25; i++) {
          // If revealed or certain (and not a mystery rare), skip normalization
          if (revealed[i] || (certain[i] && certain[i] !== "?")) continue;

          // Filter out rare names that haven't been started (e.g. don't show "Red" if we haven't found Red)
          const raresToIgnore = rareKeys.filter((color) => !revealedColors.includes(color));

          // Calculate total weight including Blue and Mystery Rare (?)
          const totalWeight = Object.entries(heatmap[i])
            .filter(([k]) => !raresToIgnore.includes(k))
            .reduce((sum, [_, v]) => sum + v, 0);

          if (totalWeight > 0) {
            Object.keys(heatmap[i]).forEach((color) => {
              if (raresToIgnore.includes(color)) {
                delete heatmap[i][color]; // Remove the clutter
              } else {
                heatmap[i][color] /= totalWeight; // Normalize to 100%
              }
            });
          }
        }

        return { certain, heatmap };
      }

      // --- UI & INTERACTION ---

      function setupPicker() {
        const container = document.getElementById("dynamic-picker");
        if (!container) return;
        container.innerHTML = "";

        if (isVictory()) {
          container.innerHTML = "<div class='picker-victory'>VICTORY!</div>";
          return;
        }
        if (isGameOver()) {
          container.innerHTML = "<div class='picker-game-over'>GAME OVER</div>";
          return;
        }

        const deductions = getDeductions();
        const cellHeatmap = selectedIdx !== null ? deductions.heatmap[selectedIdx] : {};
        const cellCertainty = selectedIdx !== null ? deductions.certain[selectedIdx] : null;
        const revealedValues = Object.values(revealed);
        const userPlacedRares = [...new Set(revealedValues)].filter((k) => ALL_COLORS[k] && !ALL_COLORS[k].always);
        const totalRaresAllowed = Math.max(0, currentColorCount - 5);

        Object.keys(ALL_COLORS).forEach((k) => {
          const ship = ALL_COLORS[k];
          const btn = document.createElement("button");
          btn.className = `pick-btn ${ship.class}`;
          btn.innerText = k;

          const segmentsPlaced = revealedValues.filter((v) => v === k).length;
          const isLockedByQuota = !ship.always && !userPlacedRares.includes(k) && userPlacedRares.length >= totalRaresAllowed;
          const isFull = k !== "B" && segmentsPlaced >= ship.len;

          // --- RESTORED STRICT GEOMETRIC VALIDATION ---
          let isPhysicallyPossible = true;
          if (selectedIdx !== null && k !== "B") {
            const foundIdx = Object.keys(revealed)
              .filter((idx) => revealed[idx] === k)
              .map(Number);
            const validPositions = getPossiblePlacements(ship.len).filter((pos) => {
              if (!pos.includes(selectedIdx)) return false; // Must contain the clicked cell
              if (!foundIdx.every((i) => pos.includes(i))) return false; // Must contain existing segments
              if (pos.some((i) => revealed[i] && revealed[i] !== k)) return false; // Can't overlap others
              return true;
            });
            isPhysicallyPossible = validPositions.length > 0;
          }

          let isImpossible = false;
          if (selectedIdx !== null) {
            if (cellCertainty && cellCertainty !== "?") {
              isImpossible = k !== cellCertainty;
            } else if (cellCertainty === "?") {
              isImpossible = ship.always || isFull || !isPhysicallyPossible;
            } else {
              // Must have probability > 0 AND be physically possible
              const prob = cellHeatmap[k] || 0;
              const rareProb = !ship.always ? cellHeatmap["?"] || 0 : 0;
              isImpossible = (prob === 0 && rareProb === 0) || !isPhysicallyPossible;
            }
          }

          if (selectedIdx === null || isLockedByQuota || isImpossible || isFull) {
            btn.disabled = true;
            btn.style.opacity = "0.2";
          } else {
            btn.onclick = () => setTile(k);
          }
          container.appendChild(btn);
        });
      }

      function selectTile(idx) {
        if (isGameOver() || isVictory()) return;

        if (revealed[idx]) {
          selectedIdx = idx;
          render();
          return;
        }

        // CHANGE: Only auto-set if the color is a REAL color (not "?")
        if (cachedCertain[idx] && cachedCertain[idx] !== "?") {
          selectedIdx = idx;
          setTile(cachedCertain[idx]);
          return;
        }

        // If it's high certainty Blue, we still auto-set
        const deductions = getDeductions();
        if (deductions.heatmap[idx]?.B >= 0.999) {
          selectedIdx = idx;
          setTile("B");
          return;
        }

        // If it's a "?" or a normal unknown cell, just select it
        selectedIdx = idx;
        render();
      }

      function setTile(color) {
        if (selectedIdx === null) return;

        saveHistory();
        revealed[selectedIdx] = color;

        // Logic to detect if this specific placement kills the player
        const shipSegments = Object.values(revealed).filter((v) => v !== "B").length;
        const blueCount = Object.values(revealed).filter((v) => v === "B").length;
        if (shipSegments >= 5 && color === "B" && blueCount >= 4) {
          lastMoveWasBadBlue = true;
        }

        selectedIdx = null;
        render();
      }

      function render() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";

        const deductions = getDeductions();
        const heatmap = deductions.heatmap;
        cachedCertain = deductions.certain;

        const revealedEntries = Object.values(revealed);
        const nonBlueFound = revealedEntries.filter((v) => v !== "B").length;
        const bluesFound = revealedEntries.filter((v) => v === "B").length; // Added this

        const rareCount = currentColorCount - 5;
        const totalSegments = 12 + rareCount * 2;

        // --- NEW: Calculate Total Blues Expected ---
        const totalBluesExpected = 25 - totalSegments;
        const allBluesFound = bluesFound >= totalBluesExpected;

        // Phase Logic
        const isGameOverState = isGameOver();
        const allCellsRevealed = isVictory();

        // Updated isHuntingBlue: ends if we found 5 ships OR if we found all possible blues
        const isHuntingBlue = nonBlueFound < 5 && !allBluesFound && !allCellsRevealed && !isGameOverState;

        // Status Updates
        const statusEl = document.getElementById("status");
        const countEl = document.getElementById("found-count");
        if (countEl) countEl.innerText = `${nonBlueFound}/${totalSegments}`;

        if (statusEl) {
          if (allCellsRevealed) {
            statusEl.innerText = "VICTORY!";
            statusEl.style.color = "#2ecc71";
          } else if (isGameOverState) {
            statusEl.innerText = "GAME OVER";
            statusEl.style.color = "#ff369b";
          } else if (allBluesFound) {
            // New Status for when you cleared the minefield early
            statusEl.innerText = "PHASE: Ship Cleanup (No Blues Left)";
            statusEl.style.color = "#9b59b6";
          } else {
            statusEl.innerText = isHuntingBlue ? "PHASE: Hunting Blues" : "PHASE: Hunting Ships (CAUTION)";
            statusEl.style.color = isHuntingBlue ? "#3498db" : "#f1c40f";
          }
        }

        // --- EXPANDED BEST MOVE CALCULATION ---
        const available = Array.from({ length: 25 }, (_, i) => i).filter((i) => !revealed[i]);
        let bestIdx = -1;

        if (available.length > 0) {
          let scores = available.map((i) => {
            const h = heatmap[i];
            const blueProb = h["B"] || 0;
            const tealProb = h["T"] || 0;
            const greenProb = h["G"] || 0;
            const yellowProb = h["Y"] || 0;
            const shipSum = Object.entries(h)
              .filter(([k]) => k !== "B")
              .reduce((a, b) => a + b[1], 0);

            let finalScore = 0;

            switch (currentMode) {
              case "anti-teal":
                if (blueProb <= 0.001) return { idx: i, score: -Infinity }; // Skip impossible blues
                const tealFound = Boolean(Object.values(revealed).filter((v) => v === "T").length);
                const greenFound = Boolean(Object.values(revealed).filter((v) => v === "G").length);
                const yellowFound = Boolean(Object.values(revealed).filter((v) => v === "Y").length);
                if (!tealFound) {
                  finalScore = isHuntingBlue ? blueProb - tealProb * 10 : shipSum;
                } else if (!greenFound || !yellowFound) {
                  finalScore = isHuntingBlue ? blueProb - tealProb * 10 - greenProb * 10 - yellowProb * 10 : shipSum;
                } else {
                  finalScore = isHuntingBlue ? blueProb : shipSum;
                }
                break;

              case "ship-hunter":
                finalScore = shipSum;
                break;

              case "standard":
              default:
                finalScore = isHuntingBlue ? -shipSum : shipSum;
                break;
            }

            return { idx: i, score: finalScore };
          });

          scores.sort((a, b) => b.score - a.score);
          bestIdx = scores[0].idx;
        }

        for (let i = 0; i < 25; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (i === selectedIdx) cell.classList.add("selected");

          if (revealed[i]) {
            const color = revealed[i];
            cell.classList.add("solved", ALL_COLORS[color].class);
            cell.innerHTML = `<span class="big-letter">${color}</span>`;
          } else if (cachedCertain[i]) {
            const color = cachedCertain[i];
            const isMysteryRare = color === "?";
            const colorClass = isMysteryRare ? "rare" : ALL_COLORS[color].class;

            // It is safe to click if it's a guaranteed ship (even a mystery one)
            // as long as we aren't in the Hunting Blue phase.
            const isSafeToClick =
              (isHuntingBlue && color === "B") || (!isHuntingBlue && color !== "B") || (allBluesFound && color !== "B");

            if (isSafeToClick) {
              cell.classList.add("best-move", "solved-predict");
              cell.style.background = isMysteryRare ? "#ff369b" : `var(--${colorClass})`;
              cell.innerHTML = `<div class="best-label">${isMysteryRare ? "RARE?" : "SAFE"}</div><span class="big-letter" style="color:white">${color}</span>`;
            } else {
              // Show ghost letter
              const ghostColor = isMysteryRare ? "#ff369b" : `var(--${colorClass})`;
              cell.innerHTML = `<span class="big-letter" style="color: ${ghostColor}; opacity: 0.8;">${color}</span>`;
            }
          } else if (heatmap[i]["?"] >= 0.99) {
            // New "Mystery Rare" block
            cell.classList.add("best-move", "solved-predict");
            cell.style.background = "#ff369b"; // Use rare color pink
            cell.innerHTML = `<div class="best-label">RARE?</div><span class="big-letter" style="color:white">?</span>`;
          } else {
            const probContainer = document.createElement("div");
            probContainer.style.cssText =
              "display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; gap: 1px; pointer-events: none;";

            let combinedRareWeight = 0;
            const displayProbs = [];
            const idRares = getActiveShips().filter((k) => !ALL_COLORS[k].always && Object.values(revealed).includes(k));

            Object.entries(heatmap[i]).forEach(([color, weight]) => {
              if (weight <= 0.01) return;
              if (color === "?") {
                combinedRareWeight = weight;
              } else if (ALL_COLORS[color] && !ALL_COLORS[color].always && !idRares.includes(color)) {
                return;
              } else {
                displayProbs.push({ color, weight });
              }
            });

            if (combinedRareWeight > 0.01) displayProbs.push({ color: "RARE", weight: combinedRareWeight, isRare: true });
            displayProbs.sort((a, b) => b.weight - a.weight);

            displayProbs.forEach(({ color, weight, isRare }) => {
              const pTag = document.createElement("span");
              const pct = Math.round(weight * 100);
              let colorHex = isRare ? "#ff369b" : `var(--${ALL_COLORS[color].class})`;
              pTag.style.cssText = `font-size: 9px; font-weight: bold; color: ${colorHex}; line-height: 1; text-shadow: 1px 1px 1px rgba(0,0,0,0.5);`;
              pTag.innerText = `${pct}% ${color}`;
              if (color === "W") pTag.className = "rainbow-text";
              probContainer.appendChild(pTag);
            });

            if (i === bestIdx && !cachedCertain[i]) {
              cell.classList.add("best-move");
              const label = document.createElement("div");
              label.className = "best-label";
              label.innerText = isHuntingBlue ? "BEST" : "SAFEST";

              cell.appendChild(label);
            }
            cell.appendChild(probContainer);
          }
          cell.onclick = () => selectTile(i);
          gridEl.appendChild(cell);
        }
        setupPicker();
      }

      window.addEventListener("DOMContentLoaded", () => {
        const defaultBtn = document.querySelectorAll(".color-toggle")[0];
        updateColorCount(6, defaultBtn);
      });
    </script>
  </body>
</html>
