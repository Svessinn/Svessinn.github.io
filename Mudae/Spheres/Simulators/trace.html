<html lang="en">

    <meta charset="UTF-8" />

    <link rel="stylesheet" href="../stylesheets/style.css" />
    <link rel="stylesheet" href="../stylesheets/traceSimulator.css" />
    <script src="../scripts/nav.js" defer></script>
  </head>
  <body>
    <div id="main-nav" class="nav-container view-quest">
      <div class="nav-row">
        <div id="tab-chest" class="nav-btn btn-chest" onclick="switchTab('chest')">CHEST</div>
        <div id="tab-harvest" class="nav-btn btn-harvest" onclick="switchTab('harvest')">HARVEST</div>
        <div id="tab-quest" class="nav-btn btn-quest" onclick="switchTab('quest')">QUEST</div>
        <div id="tab-trace" class="nav-btn btn-trace" onclick="switchTab('trace')">TRACE</div>
      </div>

      <div class="nav-row mode-section chest-links">
        <a href="../Solvers/chest.html" class="nav-btn">CHEST SOLVER</a>
        <a href="../Simulators/chest.html" class="nav-btn">CHEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section harvest-links">
        <a href="../Solvers/harvest.html" class="nav-btn">HARVEST SOLVER</a>
        <a href="../Simulators/harvest.html" class="nav-btn">HARVEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section quest-links">
        <a href="../Solvers/quest.html" class="nav-btn">QUEST SOLVER</a>
        <a href="quest.html" class="nav-btn">QUEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section trace-links">
        <a href="../Solvers/trace.html" class="nav-btn">TRACE SOLVER</a>
        <a href="#" class="nav-btn current-page">TRACE SIMULATOR</a>
      </div>
    </div>

    <div class="stats">
      <h3 class="wip">Work in Progress</h3>
      <h1>Trace Simulator</h1>
      <div>Blue Clicks Used: <span id="clicks" style="color: #ff4757; font-weight: bold">0</span> / 4</div>
      <div id="status" style="margin-top: 5px; font-size: 12px; color: #aaa">Click spheres. Only Blue costs a click!</div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="controls">
      <button onclick="resetGame()" class="reset-button">RESET GAME</button>
    </div>

    <script>
      const COLOR_MAP = {
        "B": { name: "BLUE", class: "blue" },
        "T": { name: "TEAL", class: "teal" },
        "G": { name: "GREEN", class: "green" },
        "Y": { name: "YELLOW", class: "yellow" },
        "O": { name: "ORANGE", class: "orange" },
        "R": { name: "RED", class: "red" },
        "W": { name: "RAINBOW", class: "rainbow" },
      };

      let board = Array(25).fill("B");
      let revealed = Array(25).fill(false);
      let blueClicks = 0;
      let gameOver = false;

      function resetGame() {
        board = Array(25).fill("B");
        revealed = Array(25).fill(false);
        blueClicks = 0;
        gameOver = false;
        document.getElementById("status").innerText = "Click spheres. Only Blue costs a click!";
        document.getElementById("status").style.color = "#aaa";

        const rarerOptions = ["O", "R", "W"];
        const selectedRer = rarerOptions[Math.floor(Math.random() * rarerOptions.length)];

        const pool = [
          { color: "T", count: 4 },
          { color: "G", count: 4 },
          { color: "Y", count: 3 },
          { color: selectedRer, count: 2 },
        ];

        pool.forEach((item) => {
          let placed = false;
          let attempts = 0;
          while (!placed && attempts < 100) {
            attempts++;
            const isRow = Math.random() > 0.5;
            const lineIdx = Math.floor(Math.random() * 5);
            const startPos = Math.floor(Math.random() * (6 - item.count));

            let indices = [];
            for (let i = 0; i < item.count; i++) {
              indices.push(isRow ? lineIdx * 5 + (startPos + i) : (startPos + i) * 5 + lineIdx);
            }

            if (indices.every((idx) => board[idx] === "B")) {
              indices.forEach((idx) => (board[idx] = item.color));
              placed = true;
            }
          }
        });
        render();
      }

      function clickCell(i) {
        if (revealed[i] || gameOver) return;

        revealed[i] = true;

        if (board[i] === "B") {
          blueClicks++;
          if (blueClicks >= 4) {
            gameOver = true;
            document.getElementById("status").innerText = "GAME OVER - Board Revealed";
            document.getElementById("status").style.color = "#ff4757";
          }
        }

        render();
      }

      function render() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";
        document.getElementById("clicks").innerText = blueClicks;

        board.forEach((color, i) => {
          const cell = document.createElement("div");
          cell.className = "cell";

          // If the cell was actually clicked by the user
          if (revealed[i]) {
            cell.classList.add(getColorClass(color));
            cell.innerText = color;
          }
          // If the game is over, show the cells that were NOT clicked
          else if (gameOver) {
            cell.classList.add(getColorClass(color));
            cell.classList.add("unrevealed-cell"); // Add a faded style
            cell.innerText = color;
          }
          // Otherwise, it's a normal clickable hidden cell
          else {
            cell.onclick = () => clickCell(i);
          }

          gridEl.appendChild(cell);
        });
      }

      function getColorClass(c) {
        const map = { "B": "blue", "T": "teal", "G": "green", "Y": "yellow", "O": "orange", "R": "red", "W": "rainbow" };
        return map[c] || "blue";
      }

      resetGame();
    </script>
  </body>
</html>
