<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trace Simulator</title>
    <meta name="description" content="Interactive simulator for Mudae's Trace ($ot) Game mode." />
    <link rel="stylesheet" href="../stylesheets/style.css" />
    <link rel="stylesheet" href="../../../stylesheets/navbar.css" />
    <link rel="stylesheet" href="../stylesheets/traceSimulator.css" />
    <link rel="stylesheet" href="../stylesheets/settings.css" />
    <script src="../../../scripts/nav.js" defer></script>
    <script src="../scripts/sphereSimulator.js"></script>
    <script src="../scripts/settings.js" defer></script>
  </head>
  <body>
    <div id="main-nav" class="nav-container view-quest">
      <div class="nav-row">
        <div id="tab-chest" class="nav-btn btn-chest" onclick="switchTab('chest')">CHEST</div>
        <div id="tab-harvest" class="nav-btn btn-harvest" onclick="switchTab('harvest')">HARVEST</div>
        <div id="tab-quest" class="nav-btn btn-quest" onclick="switchTab('quest')">QUEST</div>
        <div id="tab-trace" class="nav-btn btn-trace" onclick="switchTab('trace')">TRACE</div>
      </div>

      <div class="nav-row mode-section chest-links">
        <a href="../Solvers/chest.html" class="nav-btn">CHEST SOLVER</a>
        <a href="../Simulators/chest.html" class="nav-btn">CHEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section harvest-links">
        <a href="../Solvers/harvest.html" class="nav-btn">HARVEST SOLVER</a>
        <a href="../Simulators/harvest.html" class="nav-btn">HARVEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section quest-links">
        <a href="../Solvers/quest.html" class="nav-btn">QUEST SOLVER</a>
        <a href="quest.html" class="nav-btn">QUEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section trace-links">
        <a href="../Solvers/trace.html" class="nav-btn">TRACE SOLVER</a>
        <a href="#" class="nav-btn current-page">TRACE SIMULATOR</a>
      </div>
    </div>

    <div class="stats">
      <div id="status-container" style="position: relative">
        <button
          id="settings-btn"
          onclick="toggleSettings(true)"
          style="position: absolute; top: 10px; right: 10px; cursor: pointer"
        >
          ⚙️
        </button>
      </div>
      <h1>Trace Simulator</h1>
      <div class="info-row">
        <div>Blue Clicks: <span id="clicks">0</span> / 4</div>
        <div>Total Value: <span id="total-value">0</span></div>
      </div>
      <div id="status">Click spheres. Only Blue costs a click!</div>
      <div id="breakdown-log"></div>
      <div id="breakdown-tray"></div>

      <div id="ship-counter"></div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="controls">
      <button onclick="reset()" class="reset-button">RESET GAME</button>
    </div>

    <div id="settings-overlay" class="hidden">
      <div class="settings-content">
        <button class="close-btn" onclick="toggleSettings(false)">×</button>
        <h2>Settings</h2>
        <hr />

        <div class="setting-item">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px">
            <label>Sphere Value</label>
            <span id="multiplier-display" style="font-weight: bold; color: #2ecc71">100%</span>
          </div>
          <div style="display: flex; align-items: center; gap: 10px">
            <button onclick="adjustMultiplier(-1)" class="fine-tune-btn">−</button>
            <input
              type="range"
              id="multiplier-slider"
              min="100"
              max="500"
              value="100"
              oninput="updateMultiplier(this.value)"
              style="width: 100%; cursor: pointer"
            />
            <button onclick="adjustMultiplier(1)" class="fine-tune-btn">+</button>
          </div>
        </div>

        <div class="setting-item">
          <label>Grid Opacity</label>
          <input type="range" id="opacity-slider" min="10" max="100" value="100" oninput="updateOpacity(this.value)" />
        </div>

        <div class="setting-item">
          <button class="reset-btn" onclick="settingsReset()">Hard Reset Game</button>
        </div>
      </div>
    </div>

    <script>
      const SHIP_PROBABILITIES = { "R": 0.16, "W": 0.18, "L": 0.82, "D": 0.39 };
      const SHIP_CONFIG = {
        "T": { name: "TEAL", length: 4, always: true },
        "G": { name: "GREEN", length: 3, always: true },
        "Y": { name: "YELLOW", length: 3, always: true },
        "O": { name: "ORANGE", length: 2, always: true },
        "R": { name: "RED", length: 2, always: false },
        "W": { name: "RAINBOW", length: 2, always: false },
        "L": { name: "LIGHT", length: 2, always: false },
        "D": { name: "DARK", length: 2, always: false },
      };

      let board = Array(25).fill("B");
      let revealed = Array(25).fill(false);
      let blueClicks = 0;
      let totalValue = 0;
      let valueMultiplier = 1.0;
      let gameOver = false;
      let currentShips = [];
      let gameData = null;

      async function loadGameData() {
        try {
          const response = await fetch("../data/colorData.json");
          gameData = await response.json();
        } catch (e) {
          console.warn("JSON failed to load.");
        }
      }

      function getVal(color) {
        let baseValue = 0;
        if (gameData && gameData.colors && gameData.colors[color]) {
          baseValue = Number(gameData.colors[color].value) || 0;
        } else {
          const fallbacks = { "P": 5, "B": 10, "T": 20, "G": 35, "Y": 55, "O": 90, "R": 150, "W": 500 };
          baseValue = fallbacks[color] || 0;
        }

        // Apply the multiplier from settings
        return Math.floor(baseValue * valueMultiplier);
      }

      function reset() {
        board = Array(25).fill("B");
        revealed = Array(25).fill(false);
        blueClicks = 0;
        totalValue = 0;
        gameOver = false;

        const statusDiv = document.getElementById("status");
        statusDiv.innerHTML = "Click spheres. Only Blue costs a click!";
        statusDiv.style.color = "#aaa";
        document.getElementById("breakdown-log").innerHTML = "";
        document.getElementById("breakdown-tray").innerHTML = "";

        const pool = [];
        Object.keys(SHIP_CONFIG).forEach((key) => {
          if (SHIP_CONFIG[key].always) pool.push({ color: key, length: SHIP_CONFIG[key].length });
        });

        let optionalShips = [];
        Object.keys(SHIP_PROBABILITIES).forEach((key) => {
          if (Math.random() < SHIP_PROBABILITIES[key]) optionalShips.push({ color: key, length: SHIP_CONFIG[key].length });
        });

        if (optionalShips.length === 0) optionalShips.push({ color: "L", length: 2 });
        currentShips = [...pool, ...optionalShips.slice(0, 4)];

        currentShips.forEach((item) => {
          let placed = false;
          let attempts = 0;
          while (!placed && attempts < 200) {
            attempts++;
            const isRow = Math.random() > 0.5;
            const lineIdx = Math.floor(Math.random() * 5);
            const startPos = Math.floor(Math.random() * (6 - item.length));
            let indices = [];
            for (let i = 0; i < item.length; i++) {
              indices.push(isRow ? lineIdx * 5 + (startPos + i) : (startPos + i) * 5 + lineIdx);
            }
            if (indices.every((idx) => board[idx] === "B")) {
              indices.forEach((idx) => (board[idx] = item.color));
              placed = true;
            }
          }
        });
        render();
      }

      async function clickCell(i) {
        if (revealed[i] || gameOver) return;
        const color = board[i];
        revealed[i] = true;
        const nonBlueFound = Object.keys(revealed).filter((idx) => revealed[idx] && board[idx] !== "B").length;

        totalValue += getVal(color);

        if (Object.keys(revealed).filter((idx) => revealed[idx] === true).length === 25) {
          gameOver = true;
          document.getElementById("status").innerText = "ALL CELLS REVEALED!";
          document.getElementById("status").style.color = "#2ecc71";
        } else if (color === "B") {
          if (blueClicks === 3 && nonBlueFound < 5) {
            document.getElementById("status").innerText = "EXTRA CHANCE USED!";
            document.getElementById("status").style.color = "#2ecc71";
          } else {
            blueClicks++;
          }
          if (blueClicks >= 4) {
            gameOver = true;
            document.getElementById("status").innerText = "GAME OVER";
            document.getElementById("status").style.color = "#ff4757";
          }
        } else {
          if (nonBlueFound >= 5) {
            document.getElementById("status").innerText = "NO EXTRA CHANCES LEFT!";
            document.getElementById("status").style.color = "#3498db";
          }
          // Trigger breakdown per-cell for L and D
          if (color === "L" || color === "D") {
            await handleBreakdown(color);
          }
        }
        render();
      }

      async function handleBreakdown(color) {
        const typeMap = { "L": "light", "D": "dark" };
        const jsonKey = typeMap[color];

        // 1. Safety check for data
        if (!gameData || !gameData.breakdown_rules || !gameData.breakdown_rules[jsonKey]) {
          console.error(`Missing rules for ${jsonKey}.`);
          return;
        }

        const rule = gameData.breakdown_rules[jsonKey];
        let results = [];

        // 2. Determine sphere count (handles both "count" and "count_options")
        let count = rule.count || 0;
        if (rule.count_options) {
          count = rule.count_options[Math.floor(Math.random() * rule.count_options.length)];
        }

        // 3. Internal Weighted Random Logic (Handles your decimal weights)
        for (let i = 0; i < count; i++) {
          const totalWeight = rule.weights.reduce((a, b) => a + b, 0);
          let random = Math.random() * totalWeight;

          for (let j = 0; j < rule.weights.length; j++) {
            if (random < rule.weights[j]) {
              results.push(rule.possible_outcomes[j]);
              break;
            }
            random -= rule.weights[j];
          }
        }

        // 4. UI and Recursion Logic
        if (results.length > 0) {
          const logContainer = document.getElementById("breakdown-log");
          const logEntry = document.createElement("div");
          logEntry.style.cssText = "color: #ffd700; font-size: 11px; margin-top: 4px; font-weight: bold; padding-left: 5px;";

          const names = results.map((r) => (r === "L" ? "Light" : gameData.colors[r]?.name || r));
          logEntry.innerText = `${SHIP_CONFIG[color].name} cell yielded: ${names.join(", ")}`;

          // Using prepend keeps the latest discovery at the top
          logContainer.prepend(logEntry);

          for (const res of results) {
            totalValue += getVal(res);
            addBreakdownUI(res);

            if (res === "L") {
              await new Promise((resolve) => setTimeout(resolve, 200));
              await handleBreakdown("L");
            }
          }
          render();
        }
      }

      function addBreakdownUI(sphereColor) {
        const tray = document.getElementById("breakdown-tray");
        const sphere = document.createElement("div");
        sphere.className = `cell solved ${getColorClass(sphereColor)}`;
        sphere.style.cssText =
          "width:28px; height:28px; font-size:10px; margin:2px; line-height:28px; border-radius:50%; text-align:center; font-weight:bold; color:white; border:1px solid rgba(255,255,255,0.3);";
        sphere.style.background = `var(--${getColorClass(sphereColor)}, #555)`;
        sphere.innerText = sphereColor;
        tray.appendChild(sphere);
      }

      function render() {
        document.getElementById("total-value").innerText = totalValue;
        document.getElementById("clicks").innerText = blueClicks;

        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";

        board.forEach((color, i) => {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (revealed[i] || gameOver) {
            cell.classList.add(getColorClass(color));
            if (gameOver && !revealed[i]) cell.classList.add("unrevealed-cell");
            cell.innerText = color;
          } else {
            cell.onclick = () => clickCell(i);
          }
          gridEl.appendChild(cell);
        });

        const counterEl = document.getElementById("ship-counter");
        if (counterEl) {
          counterEl.innerHTML = "";
          const counts = {};
          board.forEach((c, i) => {
            if (revealed[i]) counts[c] = (counts[c] || 0) + 1;
          });
          currentShips.forEach((item) => {
            const isFound = (counts[item.color] || 0) >= item.length;
            const badge = document.createElement("span");
            badge.innerText = SHIP_CONFIG[item.color].name + (isFound ? " ✓" : "");
            badge.style.cssText = `background: ${isFound ? "#2ed573" : "var(--" + getColorClass(item.color) + ", #555)"}; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin: 2px; text-decoration: ${isFound ? "line-through" : "none"}; border: ${isFound ? "1px solid #fff" : "1px solid transparent"}; opacity: ${isFound ? "1" : "0.7"}`;
            counterEl.appendChild(badge);
          });
        }
      }

      function getColorClass(c) {
        const map = {
          "B": "blue",
          "T": "teal",
          "G": "green",
          "Y": "yellow",
          "O": "orange",
          "R": "red",
          "W": "rainbow",
          "L": "light",
          "D": "dark",
          "P": "purple",
        };
        return map[c] || "blue";
      }

      window.addEventListener("DOMContentLoaded", async () => {
        await loadGameData();
        reset();
      });
    </script>
  </body>
</html>
