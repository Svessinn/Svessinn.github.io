<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mudae $ot Simulator</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/nav.js" defer></script>
    <script>
      // Ensure the navbar highlights Trace on load
      window.addEventListener("DOMContentLoaded", () => switchTab("trace"));
    </script>
  </head>
  <body>
    <div id="main-nav" class="nav-container view-quest">
      <div class="nav-row">
        <div id="tab-quest" class="nav-btn btn-quest active" onclick="switchTab('quest')">$OQ QUEST</div>
        <div id="tab-trace" class="nav-btn btn-trace" onclick="switchTab('trace')">$OT TRACE</div>
      </div>

      <div class="nav-row mode-section quest-links">
        <a href="../Solvers/quest.html" class="nav-btn">QUEST SOLVER</a>
        <a href="quest.html" class="nav-btn">QUEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section trace-links">
        <a href="../Solvers/trace.html" class="nav-btn">TRACE SOLVER</a>
        <a href="#" class="nav-btn current-page">TRACE SIMULATOR</a>
      </div>
    </div>

    <div class="stats">
      <h3>Work in Progress</h3>
      <h1><s>$ot Game Simulator</s></h1>
      <div>Blue Clicks Used: <span id="clicks" style="color: #ff4757; font-weight: bold">0</span> / 4</div>
      <div id="status" style="margin-top: 5px; font-size: 12px; color: #aaa">Click spheres. Only Blue costs a click!</div>
    </div>

    <div class="grid" id="grid"></div>
    <button onclick="resetGame()" style="margin-top: 20px; padding: 10px">RESET GAME</button>

    <script>
      const COLOR_MAP = {
        "B": { name: "BLUE", class: "blue" },
        "T": { name: "TEAL", class: "teal" },
        "G": { name: "GREEN", class: "green" },
        "Y": { name: "YELLOW", class: "yellow" },
        "O": { name: "ORANGE", class: "orange" },
        "R": { name: "RED", class: "red" },
        "W": { name: "RAINBOW", class: "rainbow" }, // 'W' for White/Rainbow
      };

      let board = Array(25).fill("B");
      let revealed = Array(25).fill(false);
      let blueClicks = 0;

      function resetGame() {
        board = Array(25).fill("B");
        revealed = Array(25).fill(false);
        blueClicks = 0;

        // 1. Determine the "Random Rarer Rarity" for this specific session
        const rarerOptions = ["O", "R", "W"];
        const selectedRarer = rarerOptions[Math.floor(Math.random() * rarerOptions.length)];

        // 2. Define the counts based on your rules
        const pool = [
          { color: "T", count: 4 }, // 4 Teals
          { color: "G", count: 4 }, // 4 Greens
          { color: "Y", count: 3 }, // 3 Yellows
          { color: selectedRarer, count: 2 }, // 2 of the Rarer Rarity
        ];

        // 3. Place them following the "Line Rule"
        pool.forEach((item) => {
          let placed = false;
          let attempts = 0;

          while (!placed && attempts < 100) {
            attempts++;
            const isRow = Math.random() > 0.5;
            const lineIdx = Math.floor(Math.random() * 5); // Which row or column
            const startPos = Math.floor(Math.random() * (6 - item.count)); // Start index in that line

            let indices = [];
            for (let i = 0; i < item.count; i++) {
              indices.push(isRow ? lineIdx * 5 + (startPos + i) : (startPos + i) * 5 + lineIdx);
            }

            // Check if all selected spots are currently Blue (empty)
            if (indices.every((idx) => board[idx] === "B")) {
              indices.forEach((idx) => (board[idx] = item.color));
              placed = true;
            }
          }
        });

        render();
      }

      function clickCell(i) {
        if (revealed[i] || blueClicks >= 4) return;
        revealed[i] = true;
        if (board[i] === "B") blueClicks++;
        render();
      }

      function render() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";
        document.getElementById("clicks").innerText = blueClicks;

        board.forEach((color, i) => {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (revealed[i]) {
            cell.classList.add(getColorClass(color));
            cell.innerText = color;
          } else {
            cell.onclick = () => clickCell(i);
          }
          gridEl.appendChild(cell);
        });
      }

      function getColorClass(c) {
        const map = {
          "B": "blue",
          "T": "teal",
          "G": "green",
          "Y": "yellow",
          "O": "orange",
          "R": "red",
          "W": "rainbow",
        };
        return map[c] || "blue"; // Fallback to blue if something goes wrong
      }

      resetGame();
    </script>
  </body>
</html>
