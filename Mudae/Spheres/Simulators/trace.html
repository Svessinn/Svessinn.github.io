<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mudae $ot Simulator</title>
    <link rel="stylesheet" href="../stylesheets/style.css" />
    <link rel="stylesheet" href="../stylesheets/traceSimulator.css" />
    <script src="../scripts/nav.js" defer></script>
  </head>
  <body>
    <div id="main-nav" class="nav-container view-quest">
      <div class="nav-row">
        <div id="tab-chest" class="nav-btn btn-chest" onclick="switchTab('chest')">CHEST</div>
        <div id="tab-harvest" class="nav-btn btn-harvest" onclick="switchTab('harvest')">HARVEST</div>
        <div id="tab-quest" class="nav-btn btn-quest" onclick="switchTab('quest')">QUEST</div>
        <div id="tab-trace" class="nav-btn btn-trace" onclick="switchTab('trace')">TRACE</div>
      </div>

      <div class="nav-row mode-section chest-links">
        <a href="../Solvers/chest.html" class="nav-btn">CHEST SOLVER</a>
        <a href="../Simulators/chest.html" class="nav-btn">CHEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section harvest-links">
        <a href="../Solvers/harvest.html" class="nav-btn">HARVEST SOLVER</a>
        <a href="../Simulators/harvest.html" class="nav-btn">HARVEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section quest-links">
        <a href="../Solvers/quest.html" class="nav-btn">QUEST SOLVER</a>
        <a href="quest.html" class="nav-btn">QUEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section trace-links">
        <a href="../Solvers/trace.html" class="nav-btn">TRACE SOLVER</a>
        <a href="#" class="nav-btn current-page">TRACE SIMULATOR</a>
      </div>
    </div>

    <div class="stats">
      <h3 class="wip">Work in Progress</h3>
      <h1>Trace Simulator</h1>
      <div>Blue Clicks Used: <span id="clicks" style="color: #ff4757; font-weight: bold">0</span> / 4</div>
      <div id="status" style="margin-top: 5px; font-size: 12px; color: #aaa">Click spheres. Only Blue costs a click!</div>
      <div id="ship-counter" style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center"></div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="controls">
      <button onclick="resetGame()" class="reset-button">RESET GAME</button>
    </div>

    <script>
      // Percentages stored as variables for easy updating
      const SHIP_PROBABILITIES = {
        "R": 0.16, // Red
        "W": 0.18, // Rainbow
        "L": 0.82, // Light
        "D": 0.39, // Dark
      };

      const SHIP_CONFIG = {
        "T": { name: "TEAL", length: 4, always: true },
        "G": { name: "GREEN", length: 3, always: true },
        "Y": { name: "YELLOW", length: 3, always: true },
        "O": { name: "ORANGE", length: 2, always: true },
        "R": { name: "RED", length: 2, always: false },
        "W": { name: "RAINBOW", length: 2, always: false },
        "L": { name: "LIGHT", length: 2, always: false },
        "D": { name: "DARK", length: 2, always: false },
      };

      let board = Array(25).fill("B");
      let revealed = Array(25).fill(false);
      let blueClicks = 0;
      let gameOver = false;
      let currentShips = [];

      function resetGame() {
        board = Array(25).fill("B");
        revealed = Array(25).fill(false);
        blueClicks = 0;
        gameOver = false;
        document.getElementById("status").innerText = "Click spheres. Only Blue costs a click!";
        document.getElementById("status").style.color = "#aaa";

        const pool = [];
        Object.keys(SHIP_CONFIG).forEach((key) => {
          if (SHIP_CONFIG[key].always) {
            pool.push({ color: key, length: SHIP_CONFIG[key].length });
          }
        });

        let optionalShips = [];
        Object.keys(SHIP_PROBABILITIES).forEach((key) => {
          if (Math.random() < SHIP_PROBABILITIES[key]) {
            optionalShips.push({ color: key, length: SHIP_CONFIG[key].length });
          }
        });

        if (optionalShips.length === 0) {
          optionalShips.push({ color: "L", length: 2 });
        } else if (optionalShips.length > 4) {
          optionalShips = optionalShips.slice(0, 4);
        }

        currentShips = [...pool, ...optionalShips];

        currentShips.forEach((item) => {
          let placed = false;
          let attempts = 0;
          while (!placed && attempts < 200) {
            attempts++;
            const isRow = Math.random() > 0.5;
            const lineIdx = Math.floor(Math.random() * 5);
            const startPos = Math.floor(Math.random() * (6 - item.length));
            let indices = [];
            for (let i = 0; i < item.length; i++) {
              indices.push(isRow ? lineIdx * 5 + (startPos + i) : (startPos + i) * 5 + lineIdx);
            }
            if (indices.every((idx) => board[idx] === "B")) {
              indices.forEach((idx) => (board[idx] = item.color));
              placed = true;
            }
          }
        });

        render();
      }

      function clickCell(i) {
        if (revealed[i] || gameOver) return;

        const isBlue = board[i] === "B";
        revealed[i] = true;

        // Count non-blue segments AFTER this click
        const nonBlueFound = Object.keys(revealed).filter((idx) => revealed[idx] && board[idx] !== "B").length;

        if (isBlue) {
          // Extra Chance Mechanic
          if (blueClicks === 3 && nonBlueFound < 5) {
            document.getElementById("status").innerText = "EXTRA CHANCE USED! +1 Blue Click granted.";
            document.getElementById("status").style.color = "#2ecc71";
          } else {
            blueClicks++;
            // Reset status if a normal blue click happens
            document.getElementById("status").innerText = "Click spheres. Only Blue costs a click!";
            document.getElementById("status").style.color = "#aaa";
          }

          if (blueClicks >= 4) {
            gameOver = true;
            document.getElementById("status").innerText = "GAME OVER - Board Revealed";
            document.getElementById("status").style.color = "#ff4757";
          }
        } else {
          // Status update on the 5th non-blue click
          if (nonBlueFound === 5) {
            document.getElementById("status").innerText = "5 segments found! Extra Chance now active on next Blue.";
            document.getElementById("status").style.color = "#00d4ff";
          }
        }

        render();
      }

      function render() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";
        document.getElementById("clicks").innerText = blueClicks;

        board.forEach((color, i) => {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (revealed[i] || gameOver) {
            cell.classList.add(getColorClass(color));
            if (gameOver && !revealed[i]) cell.classList.add("unrevealed-cell");
            cell.innerText = color;
          } else {
            cell.onclick = () => clickCell(i);
          }
          gridEl.appendChild(cell);
        });

        const counterEl = document.getElementById("ship-counter");
        if (counterEl) {
          counterEl.innerHTML = "";
          const revealedCounts = {};
          board.forEach((color, i) => {
            if (revealed[i]) {
              revealedCounts[color] = (revealedCounts[color] || 0) + 1;
            }
          });

          currentShips.forEach((item) => {
            const isFound = (revealedCounts[item.color] || 0) >= item.length;
            const badge = document.createElement("span");
            badge.innerText = SHIP_CONFIG[item.color].name;
            badge.style.cssText = `
          background: ${isFound ? "#2ed573" : "var(--" + getColorClass(item.color) + ", #555)"}; 
          color: #fff; 
          padding: 2px 8px; 
          border-radius: 4px; 
          font-size: 10px; 
          font-weight: bold;
          text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
          margin: 2px;
          display: inline-block;
          border: ${isFound ? "1px solid #fff" : "1px solid transparent"};
          opacity: ${isFound ? "1" : "0.8"};
          text-decoration: ${isFound ? "line-through" : "none"};
        `;
            if (isFound) badge.innerText += " ✓";
            counterEl.appendChild(badge);
          });
        }
      }

      function getColorClass(c) {
        const map = {
          "B": "blue",
          "T": "teal",
          "G": "green",
          "Y": "yellow",
          "O": "orange",
          "R": "red",
          "W": "rainbow",
          "L": "light",
          "D": "dark",
        };
        return map[c] || "blue";
      }

      window.addEventListener("DOMContentLoaded", resetGame);
    </script>
  </body>
</html>
