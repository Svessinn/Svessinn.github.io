<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mudae $ot Strategic Solver</title>
    <link rel="stylesheet" href="../stylesheets/style.css" />
    <link rel="stylesheet" href="../stylesheets/traceSolver.css" />
    <script src="../scripts/nav.js" defer></script>
  </head>
  <body>
    <div id="main-nav" class="nav-container">
      <div class="nav-row">
        <div id="tab-quest" class="nav-btn btn-quest" onclick="switchTab('quest')">$OQ QUEST</div>
        <div id="tab-trace" class="nav-btn btn-trace" onclick="switchTab('trace')">$OT TRACE</div>
      </div>
      <div class="nav-row mode-section quest-links">
        <a href="quest.html" class="nav-btn">QUEST SOLVER</a>
        <a href="../Simulators/quest.html" class="nav-btn">QUEST SIMULATOR</a>
      </div>
      <div class="nav-row mode-section trace-links">
        <a href="#" class="nav-btn current-page">TRACE SOLVER</a>
        <a href="../Simulators/trace.html" class="nav-btn">TRACE SIMULATOR</a>
      </div>
    </div>

    <div class="stats">
      <h1>$ot Strategic Solver</h1>
      <div id="status">Ships: Teal(4), Green(4), Yellow(3), Rare(2)</div>
      <div class="stat-row">
        <div class="stat-item">
          <span class="stat-val" id="found-count">0/13</span>
          <span class="stat-lbl">SPHERES FOUND</span>
        </div>
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <div id="picker-area" class="picker-container" style="display: none">
      <div class="picker">
        <button class="pick-btn blue" onclick="setTile('B')">B</button>
        <button class="pick-btn teal" onclick="setTile('T')">T</button>
        <button class="pick-btn green" onclick="setTile('G')">G</button>
        <button class="pick-btn yellow" onclick="setTile('Y')">Y</button>
        <button class="pick-btn orange" onclick="setTile('O')">O</button>
        <button class="pick-btn red" onclick="setTile('R')">R</button>
        <button class="pick-btn rainbow" onclick="setTile('W')">W</button>
      </div>
    </div>

    <div class="controls">
      <button onclick="location.reload()" class="reset-button">RESET SOLVER</button>
    </div>

    <script>
      let revealed = {};
      let selectedIdx = null;

      // Applied requested ship lengths
      const SHIPS = {
        "T": { class: "teal", name: "TEAL", val: 20, len: 4 },
        "G": { class: "green", name: "GREEN", val: 35, len: 4 },
        "Y": { class: "yellow", name: "YELLOW", val: 55, len: 3 },
        "O": { class: "orange", name: "ORANGE", val: 90, len: 2 },
        "R": { class: "red", name: "RED", val: 150, len: 2 },
        "W": { class: "rainbow", name: "RAINBOW", val: 500, len: 2 },
      };

      const BLUE = { class: "blue", name: "BLUE", val: 10 };

      function setTile(color) {
        revealed[selectedIdx] = color;
        selectedIdx = null;
        document.getElementById("picker-area").style.display = "none";
        render();
      }

      function getCounts() {
        let counts = { T: 0, G: 0, Y: 0, O: 0, R: 0, W: 0, B: 0 };
        Object.values(revealed).forEach((v) => {
          if (counts[v] !== undefined) counts[v]++;
        });
        return counts;
      }

      function getDeductions() {
        let certain = {};
        let heatmap = Array(25)
          .fill(null)
          .map(() => ({}));
        let totalPlacementsPerColor = {};
        const counts = getCounts();

        Object.keys(SHIPS).forEach((color) => {
          const ship = SHIPS[color];
          const pos = Object.keys(revealed)
            .filter((k) => revealed[k] === color)
            .map(Number);

          if (counts[color] >= ship.len) return;

          let validPlacements = [];
          totalPlacementsPerColor[color] = 0;

          // Scan Horizontal
          for (let r = 0; r < 5; r++) {
            for (let c = 0; c <= 5 - ship.len; c++) {
              let tiles = [];
              let possible = true;
              for (let i = 0; i < ship.len; i++) {
                let idx = r * 5 + (c + i);
                if (revealed[idx] && revealed[idx] !== color) {
                  possible = false;
                  break;
                }
                tiles.push(idx);
              }
              if (possible && pos.every((p) => tiles.includes(p))) validPlacements.push(tiles);
            }
          }

          // Scan Vertical
          for (let c = 0; c < 5; c++) {
            for (let r = 0; r <= 5 - ship.len; r++) {
              let tiles = [];
              let possible = true;
              for (let i = 0; i < ship.len; i++) {
                let idx = (r + i) * 5 + c;
                if (revealed[idx] && revealed[idx] !== color) {
                  possible = false;
                  break;
                }
                tiles.push(idx);
              }
              if (possible && pos.every((p) => tiles.includes(p))) validPlacements.push(tiles);
            }
          }

          // Calculate Heatmap & Certainty
          if (validPlacements.length > 0) {
            totalPlacementsPerColor[color] = validPlacements.length;

            // Check for 100% Certainty
            validPlacements[0].forEach((idx) => {
              if (validPlacements.every((p) => p.includes(idx))) {
                if (!revealed[idx]) certain[idx] = color;
              }
            });

            // Count occurrences for percentage
            validPlacements.forEach((p) => {
              p.forEach((idx) => {
                if (!revealed[idx]) {
                  heatmap[idx][color] = (heatmap[idx][color] || 0) + 1;
                }
              });
            });
          }
        });

        return { certain, heatmap, totalPlacementsPerColor };
      }

      function selectTile(idx) {
        const { certain } = getDeductions();
        if (certain[idx]) {
          selectedIdx = idx;
          setTile(certain[idx]);
          return;
        }

        selectedIdx = idx;
        document.getElementById("picker-area").style.display = "block";
        const counts = getCounts();

        document.querySelectorAll(".pick-btn").forEach((btn) => {
          const color = btn.innerText === "W" ? "W" : btn.innerText;
          if (color === "B") {
            btn.disabled = false;
            return;
          }
          btn.disabled = counts[color] >= (SHIPS[color] ? SHIPS[color].len : 0);
        });
        render();
      }

      function render() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";
        const { certain, heatmap, totalPlacementsPerColor } = getDeductions();

        document.getElementById("found-count").innerText = `${Object.values(revealed).filter((v) => v !== "B").length}/13`;

        for (let i = 0; i < 25; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (i === selectedIdx) cell.classList.add("selected");

          if (revealed[i]) {
            const data = SHIPS[revealed[i]] || BLUE;
            cell.classList.add("solved", data.class);
            cell.innerHTML = `<span class="big-letter">${revealed[i]}</span><span class="value-label">+${data.val}</span>`;
          } else if (certain[i]) {
            const data = SHIPS[certain[i]];
            cell.classList.add("best-move");
            cell.onclick = () => selectTile(i);
            cell.innerHTML = `<div class="best-label">100%</div><span class="prob" style="color:white;">${data.name}</span>`;
          } else {
            cell.onclick = () => selectTile(i);

            // Calculate highest probability color for this tile
            let bestColor = null;
            let maxPct = 0;

            Object.keys(heatmap[i]).forEach((color) => {
              let pct = (heatmap[i][color] / totalPlacementsPerColor[color]) * 100;
              if (pct > maxPct) {
                maxPct = pct;
                bestColor = color;
              }
            });

            if (bestColor && maxPct > 5) {
              const data = SHIPS[bestColor];
              cell.innerHTML = `<span class="prob" style="color:var(--${data.class})">${Math.round(maxPct)}% ${bestColor}</span>`;
              // Add a subtle background glow based on probability
              cell.style.boxShadow = `inset 0 0 ${maxPct / 5}px var(--${data.class})`;
            } else {
              cell.innerHTML = `<span class="prob" style="color: #555">??</span>`;
            }
          }
          gridEl.appendChild(cell);
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        if (typeof switchTab === "function") switchTab("trace");
        render();
      });
    </script>
  </body>
</html>
