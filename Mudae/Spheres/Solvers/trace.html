<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trace Solver</title>
    <meta name="description" content="Interactive solver for Mudae's Trace ($ot) Game mode." />
    <link rel="stylesheet" href="../stylesheets/style.css" />
    <link rel="stylesheet" href="../stylesheets/traceSolver.css" />
    <script src="../scripts/nav.js" defer></script>
  </head>
  <body>
    <div id="main-nav" class="nav-container view-quest">
      <div class="nav-row">
        <div id="tab-chest" class="nav-btn btn-chest" onclick="switchTab('chest')">CHEST</div>
        <div id="tab-harvest" class="nav-btn btn-harvest" onclick="switchTab('harvest')">HARVEST</div>
        <div id="tab-quest" class="nav-btn btn-quest" onclick="switchTab('quest')">QUEST</div>
        <div id="tab-trace" class="nav-btn btn-trace" onclick="switchTab('trace')">TRACE</div>
      </div>

      <div class="nav-row mode-section chest-links">
        <a href="../Solvers/chest.html" class="nav-btn">CHEST SOLVER</a>
        <a href="../Simulators/chest.html" class="nav-btn">CHEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section harvest-links">
        <a href="../Solvers/harvest.html" class="nav-btn">HARVEST SOLVER</a>
        <a href="../Simulators/harvest.html" class="nav-btn">HARVEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section quest-links">
        <a href="quest.html" class="nav-btn">QUEST SOLVER</a>
        <a href="../Simulators/quest.html" class="nav-btn">QUEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section trace-links">
        <a href="#" class="nav-btn current-page">TRACE SOLVER</a>
        <a href="../Simulators/trace.html" class="nav-btn">TRACE SIMULATOR</a>
      </div>
    </div>

    <div class="stats">
      <h1>Trace Solver</h1>
      <div style="margin-bottom: 15px">
        <div style="font-size: 11px; color: #888; margin-bottom: 8px">TOTAL COLORS (INCLUDING BLUE)</div>
        <div class="nav-row" style="justify-content: center; background: transparent; border: none; padding: 0">
          <button class="nav-btn color-toggle" onclick="updateColorCount(6, this)">6</button>
          <button class="nav-btn color-toggle" onclick="updateColorCount(7, this)">7</button>
          <button class="nav-btn color-toggle" onclick="updateColorCount(8, this)">8</button>
          <button class="nav-btn color-toggle" onclick="updateColorCount(9, this)">9</button>
        </div>
      </div>
      <div id="status" style="font-size: 11px; color: #aaa">PHASE: Hunting Blues</div>
      <div class="stat-row">
        <div class="stat-item">
          <span class="stat-val" id="found-count">0/--</span>
          <span class="stat-lbl">SHIP SEGMENTS</span>
        </div>
      </div>
    </div>

    <div class="game-container">
      <div class="grid" id="grid"></div>

      <div id="picker-area" class="picker-container">
        <div
          id="selection-info"
          style="font-size: 10px; color: #888; margin-bottom: 10px; text-align: center; text-transform: uppercase"
        >
          Select a cell on the grid
        </div>
        <div class="picker" id="dynamic-picker"></div>
      </div>
    </div>

    <div class="controls" style="display: flex; gap: 10px; justify-content: center">
      <button onclick="undoMove()" class="reset-button" id="undo-btn" style="background: #444; border-color: #666" disabled>
        UNDO LAST MOVE
      </button>
      <button onclick="location.reload()" class="reset-button">RESET SOLVER</button>
    </div>

    <script>
      let revealed = {};
      let history = [];
      let selectedIdx = null;
      let currentColorCount = 6;
      let cachedCertain = {};

      const ALL_COLORS = {
        "B": { class: "blue", name: "BLUE", len: 0, always: true },
        "T": { class: "teal", name: "TEAL", len: 4, always: true },
        "G": { class: "green", name: "GREEN", len: 3, always: true },
        "Y": { class: "yellow", name: "YELLOW", len: 3, always: true },
        "O": { class: "orange", name: "ORANGE", len: 2, always: true },
        "R": { class: "red", name: "RED", len: 2, always: false },
        "W": { class: "rainbow", name: "RAINBOW", len: 2, always: false },
        "L": { class: "light", name: "LIGHT", len: 2, always: false },
        "D": { class: "dark", name: "DARK", len: 2, always: false },
      };

      function updateColorCount(count, btn) {
        document.querySelectorAll(".color-toggle").forEach((b) => b.classList.remove("current-page"));
        btn.classList.add("current-page");
        currentColorCount = parseInt(count);
        resetSolver();
      }

      function resetSolver() {
        revealed = {};
        history = [];
        selectedIdx = null;
        render();
      }

      function saveHistory() {
        history.push(JSON.stringify(revealed));
        document.getElementById("undo-btn").disabled = false;
      }

      function undoMove() {
        if (history.length === 0) return;
        revealed = JSON.parse(history.pop());
        selectedIdx = null;
        if (history.length === 0) document.getElementById("undo-btn").disabled = true;
        render();
      }

      function getActiveShips() {
        const common = Object.keys(ALL_COLORS).filter((k) => ALL_COLORS[k].always);
        const revealedValues = Object.values(revealed);
        const userPlacedRares = [...new Set(revealedValues)].filter((k) => !ALL_COLORS[k].always);
        const totalRaresAllowed = Math.max(0, currentColorCount - 5);

        if (userPlacedRares.length < totalRaresAllowed) {
          const allRares = Object.keys(ALL_COLORS).filter((k) => !ALL_COLORS[k].always);
          return [...common, ...allRares];
        }
        return [...common, ...userPlacedRares];
      }

      function getPossiblePlacements(len) {
        let placements = [];
        for (let r = 0; r < 5; r++) {
          for (let c = 0; c <= 5 - len; c++) {
            let ship = [];
            for (let i = 0; i < len; i++) ship.push(r * 5 + (c + i));
            placements.push(ship);
          }
        }
        for (let c = 0; c < 5; c++) {
          for (let r = 0; r <= 5 - len; r++) {
            let ship = [];
            for (let i = 0; i < len; i++) ship.push((r + i) * 5 + c);
            placements.push(ship);
          }
        }
        return placements;
      }

      function getDeductions() {
        let virtualRevealed = { ...revealed };
        let heatmap = Array(25)
          .fill(null)
          .map(() => ({}));
        let certain = {};
        let foundNewCertainty = true;

        const active = getActiveShips();
        const allPossibleRares = Object.keys(ALL_COLORS).filter((k) => !ALL_COLORS[k].always);
        const totalRaresExpected = currentColorCount - 5;
        const identifiedRares = [...new Set(Object.values(revealed))].filter((k) => !ALL_COLORS[k].always);
        const missingRaresCount = totalRaresExpected - identifiedRares.length;

        // PASS 1: GEOMETRIC INTERSECTION (Forced Cells)
        while (foundNewCertainty) {
          foundNewCertainty = false;
          const currentCounts = {};
          Object.values(virtualRevealed).forEach((v) => (currentCounts[v] = (currentCounts[v] || 0) + 1));

          active.forEach((color) => {
            const ship = ALL_COLORS[color];
            const foundIdx = Object.keys(virtualRevealed)
              .filter((k) => virtualRevealed[k] === color)
              .map(Number);
            if (currentCounts[color] >= ship.len) return;

            let validPos = getPossiblePlacements(ship.len).filter((pos) => {
              if (!foundIdx.every((i) => pos.includes(i))) return false;
              if (pos.some((i) => virtualRevealed[i] && virtualRevealed[i] !== color)) return false;
              return true;
            });

            if (validPos.length > 0) {
              let intersection = validPos[0].filter((idx) => validPos.every((p) => p.includes(idx)));
              intersection.forEach((idx) => {
                if (!virtualRevealed[idx]) {
                  virtualRevealed[idx] = color;
                  certain[idx] = color;
                  heatmap[idx] = { [color]: 1 };
                  foundNewCertainty = true;
                }
              });
            }
          });
        }

        // PASS 2: FLOATING SHIP WEIGHTS
        active.forEach((color) => {
          const ship = ALL_COLORS[color];
          const currentCount = Object.values(virtualRevealed).filter((v) => v === color).length;
          if (currentCount >= ship.len) return;

          const foundIdx = Object.keys(virtualRevealed)
            .filter((k) => virtualRevealed[k] === color)
            .map(Number);
          let validPos = getPossiblePlacements(ship.len).filter((pos) => {
            if (!foundIdx.every((i) => pos.includes(i))) return false;
            if (pos.some((i) => virtualRevealed[i] && virtualRevealed[i] !== color)) return false;
            return true;
          });

          if (validPos.length > 0) {
            const weight = 1 / validPos.length;
            validPos.forEach((p) =>
              p.forEach((idx) => {
                if (!revealed[idx] && !certain[idx]) {
                  heatmap[idx][color] = (heatmap[idx][color] || 0) + weight;
                }
              }),
            );
          }
        });

        // PASS 3: MYSTERY RARE PROBABILITY
        if (missingRaresCount > 0) {
          const unidentifiedRares = allPossibleRares.filter((r) => !identifiedRares.includes(r));
          let validPos = getPossiblePlacements(2).filter((pos) => pos.every((idx) => !virtualRevealed[idx]));

          if (validPos.length > 0) {
            const weight = missingRaresCount / validPos.length;
            validPos.forEach((p) =>
              p.forEach((idx) => {
                if (!revealed[idx] && !certain[idx]) {
                  unidentifiedRares.forEach((r) => {
                    heatmap[idx][r] = (heatmap[idx][r] || 0) + weight;
                  });
                  heatmap[idx]["?"] = (heatmap[idx]["?"] || 0) + weight;
                }
              }),
            );
          }
        }

        // PASS 4: BLUE POOL & FINAL NORMALIZATION
        const totalShipSegments = 12 + totalRaresExpected * 2;
        const totalBluesExpected = 25 - totalShipSegments;
        const bluesFound = Object.values(revealed).filter((v) => v === "B").length;
        const bluesRemaining = Math.max(0, totalBluesExpected - bluesFound);

        const blueEligible = Array.from({ length: 25 }, (_, i) => i).filter((i) => !revealed[i] && !certain[i]);
        const blueWeight = blueEligible.length > 0 ? bluesRemaining / blueEligible.length : 0;

        for (let i = 0; i < 25; i++) {
          if (revealed[i] || certain[i]) continue;
          heatmap[i]["B"] = blueWeight;
          const total = Object.values(heatmap[i]).reduce((a, b) => a + b, 0);
          if (total > 0) Object.keys(heatmap[i]).forEach((k) => (heatmap[i][k] /= total));
          else heatmap[i] = { "B": 1 };
        }

        return { certain, heatmap };
      }

      function setupPicker() {
        const container = document.getElementById("dynamic-picker");
        if (!container) return;
        container.innerHTML = "";

        const deductions = getDeductions();
        const cellHeatmap = selectedIdx !== null ? deductions.heatmap[selectedIdx] : {};
        const revealedValues = Object.values(revealed);
        const userPlacedRares = [...new Set(revealedValues)].filter((k) => !ALL_COLORS[k].always);
        const totalRaresAllowed = Math.max(0, currentColorCount - 5);

        Object.keys(ALL_COLORS).forEach((k) => {
          const ship = ALL_COLORS[k];
          const isRare = !ship.always;
          const alreadyOnBoard = userPlacedRares.includes(k);

          const btn = document.createElement("button");
          btn.className = `pick-btn ${ship.class}`;
          btn.innerText = k;

          const isLockedByQuota = isRare && !alreadyOnBoard && userPlacedRares.length >= totalRaresAllowed;
          const isPhysicallyImpossible = selectedIdx !== null && k !== "B" && !cellHeatmap[k];
          const segmentsUsed = revealedValues.filter((v) => v === k).length;
          const isFull = k !== "B" && segmentsUsed >= (ship.len || 0);

          if (selectedIdx === null || isLockedByQuota || isPhysicallyImpossible || isFull) {
            btn.disabled = true;
            btn.style.opacity = "0.2";
          } else {
            btn.onclick = () => setTile(k);
          }
          container.appendChild(btn);
        });
      }

      function selectTile(idx) {
        if (revealed[idx]) {
          selectedIdx = idx;
          render();
          return;
        }
        if (cachedCertain[idx]) {
          selectedIdx = idx;
          setTile(cachedCertain[idx]);
          return;
        }
        const deductions = getDeductions();
        if (deductions.heatmap[idx] && deductions.heatmap[idx]["B"] >= 0.999) {
          selectedIdx = idx;
          setTile("B");
          return;
        }
        selectedIdx = idx;
        render();
      }

      function setTile(color) {
        if (selectedIdx === null) return;
        saveHistory();
        revealed[selectedIdx] = color;
        selectedIdx = null;
        render();
      }

      function render() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";

        const deductions = getDeductions();
        const heatmap = deductions.heatmap;
        cachedCertain = deductions.certain;

        const revealedEntries = Object.values(revealed);
        const nonBlueFound = revealedEntries.filter((v) => v !== "B").length;
        const rareCount = currentColorCount - 5;
        const totalSegments = 12 + rareCount * 2;
        const totalBlues = 25 - totalSegments;
        const bluesFound = revealedEntries.filter((v) => v === "B").length;

        const isHuntingBlue = nonBlueFound < 5 && bluesFound < totalBlues;

        const statusEl = document.getElementById("status");
        const countEl = document.getElementById("found-count");
        if (countEl) countEl.innerText = `${nonBlueFound}/${totalSegments}`;

        const available = Array.from({ length: 25 }, (_, i) => i).filter((i) => !revealed[i]);
        const maxBlue = available.length > 0 ? Math.max(...available.map((i) => heatmap[i]["B"] || 0)) : 0;

        for (let i = 0; i < 25; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (i === selectedIdx) cell.classList.add("selected");

          if (revealed[i]) {
            const color = revealed[i];
            cell.classList.add("solved", ALL_COLORS[color].class);
            cell.innerHTML = `<span class="big-letter">${color}</span>`;
          } else if (cachedCertain[i]) {
            const color = cachedCertain[i];
            const colorClass = ALL_COLORS[color].class;
            if (!isHuntingBlue) {
              cell.classList.add("best-move", "solved-predict");
              cell.style.background = `var(--${colorClass})`;
              cell.innerHTML = `<div class="best-label">100%</div><span class="big-letter" style="color:white">${color}</span>`;
            } else {
              cell.innerHTML = `<span class="big-letter" style="color: var(--${colorClass}); opacity: 0.8;">${color}</span>`;
            }
          } else if (heatmap[i]["B"] >= 0.999) {
            cell.innerHTML = `<span class="big-letter" style="color: #3498db; opacity: 0.5;">B</span>`;
            if (isHuntingBlue) {
              cell.classList.add("best-move");
              cell.innerHTML += `<div class="best-label">BEST</div>`;
            }
          } else {
            const probContainer = document.createElement("div");
            probContainer.style.cssText =
              "display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; gap: 1px; pointer-events: none;";

            let combinedRareWeight = 0;
            const displayProbs = [];
            const identifiedRares = getActiveShips().filter((k) => !ALL_COLORS[k].always && Object.values(revealed).includes(k));

            Object.entries(heatmap[i]).forEach(([color, weight]) => {
              if (weight <= 0.01) return;
              if (color === "?" || (ALL_COLORS[color] && !ALL_COLORS[color].always && !identifiedRares.includes(color))) {
                combinedRareWeight += weight;
              } else {
                displayProbs.push({ color, weight });
              }
            });

            if (combinedRareWeight > 0.01) displayProbs.push({ color: "RARE", weight: combinedRareWeight, isRare: true });
            displayProbs.sort((a, b) => b.weight - a.weight);

            displayProbs.forEach(({ color, weight, isRare }) => {
              const pTag = document.createElement("span");
              const pct = Math.round(weight * 100);
              let colorHex = isRare ? "#ff369b" : `var(--${ALL_COLORS[color].class})`;
              pTag.style.cssText = `font-size: 9px; font-weight: bold; color: ${colorHex}; line-height: 1; text-shadow: 1px 1px 1px rgba(0,0,0,0.5);`;
              pTag.innerText = `${pct}% ${color}`;
              pTag.className = color === "W" ? "rainbow-text" : "";
              probContainer.appendChild(pTag);
            });

            if (isHuntingBlue && maxBlue > 0 && heatmap[i]["B"] === maxBlue) {
              cell.classList.add("best-move");
              const label = document.createElement("div");
              label.className = "best-label";
              label.innerText = "BEST";
              cell.appendChild(label);
            }
            cell.appendChild(probContainer);
          }
          cell.onclick = () => selectTile(i);
          gridEl.appendChild(cell);
        }
        setupPicker();
      }

      window.addEventListener("DOMContentLoaded", () => {
        const defaultBtn = document.querySelectorAll(".color-toggle")[0];
        updateColorCount(6, defaultBtn);
      });
    </script>
  </body>
</html>
