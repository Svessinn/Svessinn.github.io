<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mudae $oq Strategic Solver - Full Color Sync</title>
    <link rel="stylesheet" href="../stylesheets/style.css" />
    <script src="../scripts/nav.js" defer></script>
  </head>
  <body>
    <div id="main-nav" class="nav-container view-quest">
      <div class="nav-row">
        <div id="tab-chest" class="nav-btn btn-chest" onclick="switchTab('chest')">CHEST</div>
        <div id="tab-harvest" class="nav-btn btn-harvest" onclick="switchTab('harvest')">HARVEST</div>
        <div id="tab-quest" class="nav-btn btn-quest" onclick="switchTab('quest')">QUEST</div>
        <div id="tab-trace" class="nav-btn btn-trace" onclick="switchTab('trace')">TRACE</div>
      </div>

      <div class="nav-row mode-section chest-links">
        <a href="../Solvers/chest.html" class="nav-btn">CHEST SOLVER</a>
        <a href="../Simulators/chest.html" class="nav-btn">CHEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section harvest-links">
        <a href="../Solvers/harvest.html" class="nav-btn">HARVEST SOLVER</a>
        <a href="../Simulators/harvest.html" class="nav-btn">HARVEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section quest-links">
        <a href="#" class="nav-btn current-page">QUEST SOLVER</a>
        <a href="../Simulators/quest.html" class="nav-btn">QUEST SIMULATOR</a>
      </div>

      <div class="nav-row mode-section trace-links">
        <a href="trace.html" class="nav-btn">TRACE SOLVER</a>
        <a href="../Simulators/trace.html" class="nav-btn">TRACE SIMULATOR</a>
      </div>
    </div>

    <div class="stats">
      <!-- <h3 class="wip">Work in Progress</h3> -->
      <h1>Quest Solver</h1>
      <div class="stat-row">
        <div class="stat-item">
          <span class="stat-val" id="clicks-left">7</span>
          <span class="stat-lbl">CLICKS LEFT</span>
        </div>
        <div class="stat-item">
          <span class="stat-val" id="combinations">12,650</span>
          <span class="stat-lbl">POSSIBILITIES</span>
        </div>
      </div>
      <div id="mode-status" style="font-size: 11px; font-weight: bold; color: #2ecc71; margin-top: 10px">
        MODE: HUNTING SPHERES
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="picker-container" id="picker-area" style="display: none">
      <div style="font-size: 12px; color: #00d4ff; font-weight: bold">SELECT RESULT IN MUDAE:</div>
      <div class="picker">
        <button id="btn-0" class="pick-btn blue" onclick="setTile(0)">B</button>
        <button id="btn-1" class="pick-btn teal" onclick="setTile(1)">T</button>
        <button id="btn-2" class="pick-btn green" onclick="setTile(2)">G</button>
        <button id="btn-3" class="pick-btn yellow" onclick="setTile(3)">Y</button>
        <button id="btn-4" class="pick-btn orange" onclick="setTile(4)">O</button>
        <button id="special-btn" class="pick-btn purple" onclick="setTile('P')">P</button>
      </div>
    </div>

    <div class="controls">
      <button onclick="location.reload()" class="reset-button">RESET SOLVER</button>
    </div>

    <script>
      const SIZE = 5;
      const REWARDS = { "P": 5, 0: 10, 1: 20, 2: 35, 3: 55, 4: 90, "R": 150 };
      const COLOR_MAP = {
        0: { letter: "B", name: "BLUE", color: "#3498db", class: "blue" },
        1: { letter: "T", name: "TEAL", color: "#1abc9c", class: "teal" },
        2: { letter: "G", name: "GREEN", color: "#2ecc71", class: "green" },
        3: { letter: "Y", name: "YELLOW", color: "#f1c40f", class: "yellow" },
        4: { letter: "O", name: "ORANGE", color: "#e67e22", class: "orange" },
        "P": { letter: "P", name: "PURPLE", color: "#9b59b6", class: "purple" },
        "R": { letter: "R", name: "RED", color: "#ff4757", class: "red" },
      };

      let selectedIdx = null;
      let revealed = [];

      function getNeighbors(idx) {
        let n = [];
        let r = Math.floor(idx / SIZE);
        let c = idx % SIZE;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            let nr = r + dr,
              nc = c + dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) n.push(nr * SIZE + nc);
          }
        }
        return n;
      }

      function getCombinations(arr, k) {
        let results = [];
        function helper(start, combo) {
          if (combo.length === k) {
            results.push([...combo]);
            return;
          }
          for (let i = start; i < arr.length; i++) helper(i + 1, [...combo, arr[i]]);
        }
        helper(0, []);
        return results;
      }
      const ALL_COMBOS = getCombinations(
        Array.from({ length: 25 }, (_, i) => i),
        4,
      );

      function calculate() {
        const filtered = ALL_COMBOS.filter((combo) => {
          return revealed.every((rev) => {
            if (rev.val === "P" || rev.val === "R") return combo.includes(rev.idx);
            return getNeighbors(rev.idx).filter((idx) => combo.includes(idx)).length === rev.val && !combo.includes(rev.idx);
          });
        });

        const probs = Array(25).fill(0);
        filtered.forEach((combo) => combo.forEach((idx) => probs[idx]++));
        const percentProbs = probs.map((p) => (filtered.length ? (p / filtered.length) * 100 : 0));

        const purplesFound = revealed.filter((r) => r.val === "P").length;
        const redFound = revealed.some((r) => r.val === "R");
        const spheresFound = purplesFound + (redFound ? 1 : 0);

        let totalClicks = 7 - revealed.length + Math.min(purplesFound, 3);
        let bestIdx = -1;
        let maxVal = -1;

        for (let i = 0; i < 25; i++) {
          if (revealed.some((r) => r.idx === i)) continue;
          if (spheresFound < 4) {
            let score = percentProbs[i] * 10 + getNeighbors(i).filter((nIdx) => !revealed.some((r) => r.idx === nIdx)).length;
            if (score > maxVal) {
              maxVal = score;
              bestIdx = i;
            }
          } else {
            let ev = [0, 1, 2, 3, 4].reduce((acc, opt) => {
              let count = filtered.filter(
                (combo) => getNeighbors(i).filter((nIdx) => combo.includes(nIdx)).length === opt,
              ).length;
              return acc + (count / filtered.length) * REWARDS[opt];
            }, 0);
            if (ev > maxVal) {
              maxVal = ev;
              bestIdx = i;
            }
          }
        }
        return {
          probs: percentProbs,
          validCount: filtered.length,
          bestIdx,
          spheresFound,
          clicks: totalClicks,
          filteredLayouts: filtered,
        };
      }

      function selectTile(idx) {
        if (revealed.some((r) => r.idx === idx)) return;
        const state = calculate();
        if (state.clicks <= 0) return;

        selectedIdx = idx;
        const purpleCount = revealed.filter((r) => r.val === "P").length;
        const specBtn = document.getElementById("special-btn");

        if (purpleCount >= 3) {
          specBtn.innerText = "R";
          specBtn.className = "pick-btn red";
          specBtn.onclick = () => setTile("R");
        } else {
          specBtn.innerText = "P";
          specBtn.className = "pick-btn purple";
          specBtn.onclick = () => setTile("P");
        }

        [0, 1, 2, 3, 4, purpleCount >= 3 ? "R" : "P"].forEach((val) => {
          const isPossible = state.filteredLayouts.some((combo) => {
            if (val === "P" || val === "R") return combo.includes(idx);
            return getNeighbors(idx).filter((nIdx) => combo.includes(nIdx)).length === val && !combo.includes(idx);
          });
          const btnId = val === "P" || val === "R" ? "special-btn" : `btn-${val}`;
          document.getElementById(btnId).disabled = !isPossible;
        });

        document.getElementById("picker-area").style.display = "block";
        render();
      }

      function setTile(val) {
        revealed.push({ idx: selectedIdx, val: val });
        selectedIdx = null;
        document.getElementById("picker-area").style.display = "none";
        render();
      }

      function render() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";
        const { probs, validCount, bestIdx, spheresFound, clicks, filteredLayouts } = calculate();

        document.getElementById("combinations").innerText = validCount.toLocaleString();
        document.getElementById("clicks-left").innerText = clicks;

        const modeStatus = document.getElementById("mode-status");
        if (clicks <= 0) {
          modeStatus.innerText = "OUT OF CLICKS - GAME OVER";
          modeStatus.style.color = "#ff4757";
        } else if (spheresFound >= 4) {
          modeStatus.innerText = "MODE: HARVESTING REWARDS";
          modeStatus.style.color = "#f1c40f";
        } else {
          modeStatus.innerText = "MODE: HUNTING SPHERES";
          modeStatus.style.color = "#2ecc71";
        }

        for (let i = 0; i < 25; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          const rev = revealed.find((r) => r.idx === i);

          if (rev) {
            const config = COLOR_MAP[rev.val];
            cell.classList.add("solved", config.class);
            cell.innerHTML = `<span class="big-letter">${config.letter}</span>`;
          } else {
            if (clicks > 0) {
              cell.onclick = () => selectTile(i);
              if (i === selectedIdx) cell.classList.add("selected");
              if (i === bestIdx && validCount > 0) {
                cell.classList.add("best-move");
                cell.innerHTML += `<div class="best-label">${spheresFound >= 4 ? "MAX REWARD" : "BEST MOVE"}</div>`;
              }
            } else {
              cell.classList.add("disabled");
            }

            const possibleVals = [0, 1, 2, 3, 4, "P", "R"].filter((val) => {
              return filteredLayouts.some((combo) => {
                if (val === "P" || val === "R") return combo.includes(i);
                return getNeighbors(i).filter((nIdx) => combo.includes(nIdx)).length === val && !combo.includes(i);
              });
            });

            let p = probs[i];
            if (p === 100) {
              const isRed = spheresFound >= 3;
              const config = isRed ? COLOR_MAP["R"] : COLOR_MAP["P"];
              cell.innerHTML += `<span class="locked-text" style="color:${config.color}">${config.name}</span>`;
            } else if (p === 0 && possibleVals.length === 1) {
              const config = COLOR_MAP[possibleVals[0]];
              cell.innerHTML += `<span class="locked-text" style="color:${config.color}">${config.name}</span>`;
            } else {
              let color = p > 50 ? "#ff4757" : p > 20 ? "#ffa502" : "#2ed573";
              cell.innerHTML += `<span class="prob" style="color:${color}">${p.toFixed(1)}%</span>`;
            }
          }
          gridEl.appendChild(cell);
        }
      }
      render();
    </script>
  </body>
</html>
