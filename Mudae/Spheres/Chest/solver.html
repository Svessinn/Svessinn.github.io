<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chest Solver</title>
    <meta name="description" content="Interactive solver for Mudae's Chest ($oc) Game mode." />
    <link rel="stylesheet" href="../stylesheets/style.css" />
    <link rel="stylesheet" href="../../../stylesheets/navbar.css" />
    <script src="../../../scripts/nav.js" defer></script>
  </head>
  <body>

        <div id="tab-chest" class="nav-btn btn-chest" onclick="switchTab('chest')">CHEST</div>
        <div id="tab-harvest" class="nav-btn btn-harvest" onclick="switchTab('harvest')">HARVEST</div>
        <div id="tab-quest" class="nav-btn btn-quest" onclick="switchTab('quest')">QUEST</div>
        <div id="tab-trace" class="nav-btn btn-trace" onclick="switchTab('trace')">TRACE</div>
      </div>

      <div class="nav-row mode-section chest-links">
        <a href="../Chest/simulator.html" class="nav-btn">SIMULATOR</a>
        <a href="../Chest/solver.html" class="nav-btn current-page">SOLVER</a>
      </div>

      <div class="nav-row mode-section harvest-links">
        <a href="../Harvest/simulator.html" class="nav-btn">SIMULATOR</a>
        <a href="../Harvest/solver.html" class="nav-btn">SOLVER</a>
      </div>

      <div class="nav-row mode-section quest-links">
        <a href="../Quest/simulator.html" class="nav-btn">SIMULATOR</a>
        <a href="../Quest/solver.html" class="nav-btn">SOLVER</a>
      </div>

      <div class="nav-row mode-section trace-links">
        <a href="../Trace/simulator.html" class="nav-btn">SIMULATOR</a>
        <a href="../Trace/solver.html" class="nav-btn">SOLVER</a>
      </div>
    </div>

    <div class="stats">
      <!-- <h3 class="wip">Work in Progress</h3> -->
      <h1>Chest Solver</h1>
      <div class="stat-row">
        <div class="stat-item">
          <span class="stat-val" id="possible-reds">24</span>
          <span class="stat-lbl">POSSIBLE RED LOCATIONS</span>
        </div>
      </div>
      <div id="status" style="margin-top: 10px; font-size: 12px; color: #aaa">Click any cell to input or change a color.</div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="picker-container" id="picker-ui" style="display: none">
      <div id="picker-title" style="font-size: 12px; font-weight: bold; color: #00d4ff; margin-bottom: 8px">
        SELECT COLOR FOUND
      </div>
      <div class="picker">
        <button class="pick-btn blue" onclick="setCellColor('B')">B</button>
        <button class="pick-btn teal" onclick="setCellColor('T')">T</button>
        <button class="pick-btn green" onclick="setCellColor('G')">G</button>
        <button class="pick-btn yellow" onclick="setCellColor('Y')">Y</button>
        <button class="pick-btn orange" onclick="setCellColor('O')">O</button>
        <button class="pick-btn red" onclick="setCellColor('R')">R</button>
        <button class="pick-btn reset-button" style="margin-top: 5px; height: 30px; font-size: 10px" onclick="setCellColor(null)">
          CLEAR
        </button>
      </div>
    </div>

    <div class="controls">
      <button id="undo-btn" class="reset-button" onclick="undoMove()" style="background: #444" disabled>UNDO MOVE</button>
      <button class="reset-button" onclick="reset()">RESET ALL</button>
    </div>

    <script>
      let selectedIdx = null;
      let revealedColors = {};
      let possibleRedIndices = [];
      let history = []; // NEW: State history
      const ALL_POSSIBLE_REDS = Array.from({ length: 25 }, (_, i) => i).filter((i) => i !== 12);
      const LIMITS = { "R": 1, "O": 2, "Y": 3, "G": 4 };

      function saveHistory() {
        history.push(JSON.stringify(revealedColors));
        const undoBtn = document.getElementById("undo-btn");
        if (undoBtn) undoBtn.disabled = false;
      }

      function undoMove() {
        if (history.length === 0) return;
        revealedColors = JSON.parse(history.pop());
        selectedIdx = null;

        if (history.length === 0) {
          const undoBtn = document.getElementById("undo-btn");
          if (undoBtn) undoBtn.disabled = true;
        }

        recalculatePossibilities();
        render();
      }

      function reset() {
        selectedIdx = null;
        revealedColors = {};
        history = [];

        const undoBtn = document.getElementById("undo-btn");
        if (undoBtn) undoBtn.disabled = true;

        possibleRedIndices = [...ALL_POSSIBLE_REDS];
        document.getElementById("picker-ui").style.display = "none";
        render();
      }

      function selectCell(idx) {
        const clickCount = Object.keys(revealedColors).length;
        // Limit to 5 clicks total as per Chest rules
        if (!revealedColors[idx] && clickCount >= 5) return;

        selectedIdx = idx;

        const counts = {};
        Object.values(revealedColors).forEach((c) => (counts[c] = (counts[c] || 0) + 1));
        if (revealedColors[idx]) counts[revealedColors[idx]]--;

        document.querySelectorAll(".pick-btn").forEach((btn) => {
          const color = btn.innerText;
          if (color === "CLEAR") return;

          // Check 1: Mudae Quantity Limits
          const isOverLimit = LIMITS[color] && counts[color] >= LIMITS[color];

          // Check 2: Mathematical Impossibility
          // We check if picking this color for this cell would empty the list of possible Reds
          let isImpossible = false;
          if (color === "R") {
            isImpossible = !possibleRedIndices.includes(idx);
          } else {
            isImpossible = !possibleRedIndices.some((redIdx) => checkPossibility(idx, color, redIdx));
          }

          if (isOverLimit || isImpossible) {
            btn.disabled = true;
            btn.style.opacity = "0.2";
            btn.style.cursor = "not-allowed";
          } else {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
          }
        });

        document.getElementById("picker-ui").style.display = "block";
        render();
      }

      function saveHistory() {
        history.push(JSON.stringify(revealedColors));
        const undoBtn = document.getElementById("undo-btn");
        if (undoBtn) undoBtn.disabled = false;
      }

      function undoMove() {
        if (history.length === 0) return;

        // Restore the last state
        revealedColors = JSON.parse(history.pop());
        selectedIdx = null;

        // Disable button if history is empty
        const undoBtn = document.getElementById("undo-btn");
        if (history.length === 0 && undoBtn) undoBtn.disabled = true;

        recalculatePossibilities();
        render();
      }

      function setCellColor(color) {
        if (selectedIdx === null) return;

        saveHistory();

        if (color === null) {
          delete revealedColors[selectedIdx];
        } else {
          revealedColors[selectedIdx] = color;
        }

        recalculatePossibilities();
        selectedIdx = null;
        document.getElementById("picker-ui").style.display = "none";
        render();
      }

      function recalculatePossibilities() {
        const entries = Object.entries(revealedColors);
        const knownRed = entries.find(([_, color]) => color === "R");

        if (knownRed) {
          // Strict Lock: Only the index that was clicked "R" is possible
          possibleRedIndices = [parseInt(knownRed[0])];
          return;
        }

        // Otherwise, filter normally
        let filtered = [...ALL_POSSIBLE_REDS];
        const occupied = Object.keys(revealedColors).map(Number);
        filtered = filtered.filter((idx) => !occupied.includes(idx));

        filtered = filtered.filter((redIdx) => {
          for (const [idx, color] of entries) {
            if (!checkPossibility(parseInt(idx), color, redIdx)) return false;
          }
          return true;
        });

        possibleRedIndices = filtered;
      }

      function checkPossibility(targetIdx, foundColor, redIdx) {
        const rr = Math.floor(redIdx / 5),
          rc = redIdx % 5;
        const tr = Math.floor(targetIdx / 5),
          tc = targetIdx % 5;
        const dr = Math.abs(rr - tr),
          dc = Math.abs(rc - tc);

        if (foundColor === "R") return targetIdx === redIdx;
        if (foundColor === "O") return (dr === 1 && dc === 0) || (dr === 0 && dc === 1);
        if (foundColor === "Y") return dr === dc && dr > 0;
        // FIX: Green can be ANYWHERE in the same row or column (dr=0 or dc=0)
        if (foundColor === "G") return (dr === 0 || dc === 0) && targetIdx !== redIdx;
        if (foundColor === "T") return dr === dc || dr === 0 || dc === 0;
        if (foundColor === "B") return !(dr === 0 || dc === 0 || dr === dc);
        return true;
      }

      function calculateBestMove() {
        const clickCount = Object.keys(revealedColors).length;
        if (clickCount >= 5) return null;

        // SEEK RED FIRST
        if (possibleRedIndices.length > 1) {
          let bestScore = -1,
            bestIdx = -1;
          for (let i = 0; i < 25; i++) {
            if (revealedColors[i]) continue;
            let outcomes = { "B": 0, "T": 0, "G": 0, "Y": 0, "O": 0, "R": 0 };
            possibleRedIndices.forEach((rIdx) => outcomes[getExpectedColor(i, rIdx)]++);
            let score = 0;
            Object.values(outcomes).forEach((count) => {
              if (count > 0) score += count * count;
            });
            if (bestIdx === -1 || score < bestScore) {
              bestScore = score;
              bestIdx = i;
            }
          }
          return { idxs: [bestIdx], target: "RED", colorCode: "#ff4757" };
        }

        // RED IS FOUND
        if (possibleRedIndices.length === 1) {
          const redIdx = possibleRedIndices[0];
          const counts = {};
          Object.values(revealedColors).forEach((c) => (counts[c] = (counts[c] || 0) + 1));

          const searchOrder = [
            { type: "O", name: "ORANGE", color: "#ffa502" },
            { type: "Y", name: "YELLOW", color: "#f1c40f" },
            { type: "G", name: "GREEN", color: "#2ecc71" },
          ];

          for (const goal of searchOrder) {
            if ((counts[goal.type] || 0) < LIMITS[goal.type]) {
              const targets = [];
              for (let i = 0; i < 25; i++) {
                if (!revealedColors[i] && i !== redIdx && checkPossibility(i, goal.type, redIdx)) {
                  targets.push(i);
                }
              }
              if (targets.length > 0) {
                return { idxs: targets, target: goal.name, colorCode: goal.color, type: goal.type };
              }
            }
          }
        }
        return null;
      }

      function getExpectedColor(targetIdx, redIdx) {
        if (targetIdx === redIdx) return "R";
        const rr = Math.floor(redIdx / 5),
          rc = redIdx % 5;
        const tr = Math.floor(targetIdx / 5),
          tc = targetIdx % 5;
        const dr = Math.abs(rr - tr),
          dc = Math.abs(rc - tc);

        // 1. Orange: Adjacent (Distance 1)
        if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) return "O";

        // 2. Yellow: Diagonal
        if (dr === dc && dr > 0) return "Y";

        // 3. Green: Row or Column (Distance > 0)
        if (dr === 0 || dc === 0) return "G";

        return "B";
      }

      function render() {
        const gridEl = document.getElementById("grid");
        gridEl.innerHTML = "";
        const clickCount = Object.keys(revealedColors).length;
        document.getElementById("possible-reds").innerText = possibleRedIndices.length;

        const moveData = calculateBestMove();
        const bestMoveIdxs = moveData ? moveData.idxs : [];
        const targetName = moveData ? moveData.target : "";
        const targetColor = moveData ? moveData.colorCode : "#aaa";

        for (let i = 0; i < 25; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (i === selectedIdx) cell.classList.add("selected");

          if (revealedColors[i]) {
            const color = revealedColors[i];
            cell.classList.add(getColorClass(color));
            cell.innerHTML = `<span class="big-letter">${color}</span>`;
            cell.onclick = () => selectCell(i);
          } else {
            if (clickCount >= 5) {
              cell.style.opacity = "0.4";
              cell.style.cursor = "not-allowed";
            }

            if (bestMoveIdxs.includes(i)) {
              cell.classList.add("best-move");
              cell.innerHTML = `<div class="best-label"">BEST MOVE</div>`;
            }

            if (possibleRedIndices.length === 1) {
              const redIdx = possibleRedIndices[0];
              if (i === redIdx) {
                cell.classList.add("best-move");
                cell.innerHTML = `<span class="locked-text" style="color:#ff4757; font-weight:bold; font-size:10px;">RED HERE</span>`;
              } else {
                // Determine what color this cell WOULD be for probability display
                // If it's adjacent, it shows Orange prob; if row/col, it shows Green prob
                const counts = {};
                Object.values(revealedColors).forEach((c) => (counts[c] = (counts[c] || 0) + 1));

                // Use checkPossibility to see if this cell matches the current target
                const currentGoalType = moveData ? moveData.type : null;
                if (currentGoalType && checkPossibility(i, currentGoalType, redIdx)) {
                  let poolSize = 0;
                  for (let k = 0; k < 25; k++) {
                    if (!revealedColors[k] && k !== redIdx && checkPossibility(k, currentGoalType, redIdx)) poolSize++;
                  }
                  const needed = LIMITS[currentGoalType] - (counts[currentGoalType] || 0);
                  const prob = poolSize > 0 ? ((needed / poolSize) * 100).toFixed(0) : 0;

                  if (prob > 0) {
                    cell.innerHTML += `<span class="prob-ghost" style="color: ${targetColor}">${prob}%</span>`;
                  }
                }
              }
            } else if (possibleRedIndices.length > 1 && possibleRedIndices.includes(i)) {
              const prob = ((1 / possibleRedIndices.length) * 100).toFixed(0);
              cell.innerHTML += `<span class="prob-ghost" style="color: #ff4757">${prob}%</span>`;
            }
            cell.onclick = () => selectCell(i);
          }
          gridEl.appendChild(cell);
        }
      }

      function getColorClass(c) {
        const map = { "B": "blue", "T": "teal", "G": "green", "Y": "yellow", "O": "orange", "R": "red" };
        return map[c] || "blue";
      }

      window.addEventListener("DOMContentLoaded", () => {
        if (typeof switchTab === "function") switchTab("chest");
        reset();
      });
    </script>
  </body>
</html>
